function openSheetEditor(userId){
  const u=uid(userId);if(!u)return;
  const editing=JSON.parse(JSON.stringify(u.sheet||defaultSheet()));if(!editing.audit)editing.audit=defaultSheet().audit;
  const isOwner=session.uid===userId;const role=session.role;
  const canEdit=isOwner||["banker","auditor","admin"].includes(role);
  const canAudit=["banker","auditor","admin"].includes(role)||(uid(session.uid||"")||{}).id===u.auditorId;
  const root=document.getElementById("modalRoot");const ov=document.createElement("div");ov.className="overlay";ov.innerHTML='<div class="modal" id="shM"></div>';ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});root.appendChild(ov);
  function readScalars(){ // безопасное чтение: числа неотрицательны и устойчивы к некорректному вводу
    document.querySelectorAll('#shM [data-p]').forEach(inp=>{setPath(editing,inp.dataset.p,inp.type==="number"?Math.max(0,num(inp.value)):inp.value);});
    document.querySelectorAll('#shM [data-arr]').forEach(inp=>{const arr=editing.assets[inp.dataset.arr];const it=arr&&arr[+inp.dataset.i];if(it)it[inp.dataset.k]=inp.dataset.k==="name"?inp.value:Math.max(0,num(inp.value));});
  }
  function recalc(){const c=computeSheet(editing);const el=document.getElementById("shCalc");if(el)el.innerHTML=calcHTML(c);}
  function draw(){document.getElementById("shM").innerHTML=sheetFormHTML(u,editing,canEdit,canAudit,isOwner);
    const mod=document.getElementById("shM");
    mod.querySelectorAll("input,textarea").forEach(inp=>inp.addEventListener("input",()=>{readScalars();recalc();}));
    const pp=mod.querySelector("#profPick");
    if(pp)pp.addEventListener("change",()=>{if(pp.value===""){return;}readScalars();applyProfession(editing,PROFESSIONS[+pp.value]);toast("Шаблон «"+PROFESSIONS[+pp.value].name+"» подставлен");draw();});
    mod.onclick=async(e)=>{const a=e.target.closest("[data-sx]");if(!a)return;const act=a.dataset.sx;readScalars();
      if(act==="addStock")editing.assets.stocks.push({name:"",qty:0,price:0});
      else if(act==="addRe")editing.assets.realEstate.push({name:"",down:0,price:0});
      else if(act==="addBiz")editing.assets.business.push({name:"",down:0,price:0});
      else if(act.indexOf("del:")===0){const[,arr,i]=act.split(":");editing.assets[arr].splice(+i,1);}
      else if(act==="save"){await saveSheet(userId,editing);ov.remove();return;}
      else if(act==="submit"){await submitSheet(userId,editing);ov.remove();return;}
      else if(act==="verify"){await verifySheet(userId,editing,true,document.getElementById("shNotes").value);ov.remove();return;}
      else if(act==="reject"){await verifySheet(userId,editing,false,document.getElementById("shNotes").value);ov.remove();return;}
      else if(act==="cancel"){ov.remove();return;}
      draw();
    };
  }
  draw();
}
function calcHTML(c){return '<div class="grid g3 keep" style="gap:6px">'+stat("Общий доход",fmt(c.totalIncome))+stat("Общий расход",fmt(c.totalExpenses))+'<div class="stat" style="border-color:'+(c.cashflow>=0?"var(--green)":"var(--red)")+'"><div class="k">Денежный поток</div><div class="v" style="color:'+(c.cashflow>=0?"var(--green)":"var(--red)")+'">'+fmt(c.cashflow)+'</div></div>'+stat("Пассивный доход",fmt(c.passive))+stat("Активы (бланк)",fmt(c.sheetAssets))+stat("Капитал (бланк)",fmt(c.netWorthSheet))+'</div>';}

  const goalOk=f.totalPassive>=c.totalExpenses,goalPct=c.totalExpenses>0?Math.min(100,Math.round(f.totalPassive/c.totalExpenses*100)):(f.totalPassive>0?100:0);

    sec("2","Расходы")+lr("Налоги",e.taxes||0)+lr("Ипотека / жильё",e.homeMortgage||0)+lr("Кредит на авто",e.carLoan||0)+lr("Кредитные карты",e.creditCards||0)+lr("Розничные",e.retail||0)+lr("Кредит банка",e.bankLoan||0)+lr("Прочие",e.other||0)+lr("Дети ("+(s.children||0)+")",c.childCost)+tot("Итого расходы",c.totalExpenses)+
    '<div class="cfbox" style="margin-top:10px"><div class="row spread"><span class="section-title" style="margin:0">Месячный денежный поток</span><span class="cf" style="color:'+(f.freeCashflow>=0?"var(--green)":"var(--red)")+'">'+fmt(f.freeCashflow)+'</span></div><div class="small muted">доход − расходы, с учётом пассивного дохода портфеля</div></div>'+
    sec("3","Активы")+lr("Кошелёк (наличные)",f.wallet)+lr("Сбережения",A.savings||0)+lr("Портфель (биржа)",f.pv)+lr("Акции (бланк)",c.stocksV)+lr("Недвижимость (бланк)",c.reV)+lr("Бизнес (бланк)",c.bizV)+tot("Итого активы",f.totalAssets)+
    sec("4","Обязательства")+lr("Ипотека",L.mortgage||0)+lr("Кредит на авто",L.carLoan||0)+lr("Кредитные карты",L.creditCards||0)+lr("Образовательный кредит",L.eduLoan||0)+lr("Банковский кредит",L.bankLoan||0)+lr("Кредиты на недвижимость",L.realEstateLoans||0)+lr("Кредит бизнеса",L.businessLoan||0)+lr("Активные кредиты ЦБ",f.loans)+tot("Итого обязательства",f.totalLiab)+

/* ---------- DEMO / DEV MODE (?dev=1) ----------
   Автономный режим без Firebase: наполняет состояние демо-данными, чтобы
   можно было показать и проверить ВСЕ экраны офлайн. Данные не сохраняются.
   Включается только явным параметром URL — в обычной работе не влияет. */
function devSeed(){
  const now=Date.now();
  // демо-биржа: активы из разных категорий + один скрытый легаси ($TECH) для показа «архива»
  const demoSyms=["$ELEC","$INDX","$MMF","$FLAT","$GOLD","$CAFE","$GBOND","$ARTF","$TECH"];
  const ass=demoSyms.map(s=>{const a=seedAsset(tpl(s));a.previousPrice=Math.round(a.price*0.97);a.history=[a.price*0.9,a.price*0.95,a.price*0.93,a.price].map(Math.round);return a;});
  const P=PROFESSIONS,prof=i=>P[i%P.length];
  const mk=(id,name,bal,i,pf,extra)=>Object.assign({id,name,role:"player",profession:prof(i).name,tableId:"TBL1",teamId:null,status:"ratrace",balance:bal,tags:[],portfolio:pf||{},sheet:sheetFromProfession(prof(i)),online:true},extra||{});
  const users=[
    mk("u1","Алия",8200,0,{"$ELEC":{qty:40,avg:18},"$INDX":{qty:12,avg:47},"$TECH":{qty:10,avg:120}},{pos:5,track:"ratrace",reputation:2}),
    mk("u2","Бекзат",3100,3,{"$FLAT":{qty:2,avg:190},"$GBOND":{qty:5,avg:98}},{pos:5,track:"ratrace"}),
    mk("u3","Дана",15400,6,{"$CAFE":{qty:3,avg:110}},{pos:7,track:"fasttrack",status:"fasttrack"}),
    mk("u4","Ерлан",-500,9,{"$GOLD":{qty:5,avg:140}},{pos:11,track:"ratrace"})
  ];
  const room={id:"DEMO",name:"Cash-Flow 2.0 · Демо",code:"DEMO",
    settings:{startBalance:5000,transferLimit:5000,loanLimit:50000,loanRate:10,adminPin:"0000",bankerPin:"1111"},
    tables:[{id:"TBL1",name:"Стол 1"}],teams:[],assets:ass,
    economy:{inflation:42,stocks:58,business:61,sentiment:55},riskIndex:48,centralBankRate:8,
    round:3,phase:"active",mode:"basic",trendId:"growth",counters:{},achievements:["first_player"],
    lastPriceUpdate:{toDate:()=>new Date(now)}};
  return {room,users};
}
function setupDevMode(){
  const p=new URLSearchParams(location.search);const role=p.get("role")||"admin",tab=p.get("tab");
  const {room,users}=devSeed();
  CODE="DEMO";M.room=room;M.users=users;M.transactions=[];M.loans=[];M.pools=[];M.startups=[];M.offers=[];M.approvals=[];M.news=[];M.history=[];
  session={code:"DEMO",role,uid:role==="player"?(p.get("who")||"u1"):null,tableId:"TBL1",tab:{admin:tab||"exchange",banker:tab||"players",auditor:tab||"sheets",player:tab||"exchange"}};
  // отладочный хук (только в DEMO): драйвим внутренние функции из devtools/preview
  window.__cf={get M(){return M},get session(){return session},render,scheduleRender,patchExchangePrices,priceTick,onRoomData,assets,uid,computeSheet:(typeof computeSheet!=="undefined"?computeSheet:null)};
}
/* Единая точка записи: в DEMO меняем состояние в памяти, иначе пишем в Firestore.
   Используется новыми механиками (поле/кубик, благотворительность). */
async function commitRoom(patch){return updateRoom(patch);}
async function commitUser(id,patch){if(DEV){const u=uid(id);if(u)Object.assign(u,patch);scheduleRender();return;}return updateDoc(doc(db,"rooms",CODE,"users",id),patch);}

/* ---------- INIT ---------- */
DEV=/[?&]dev=1/.test(location.search);
if(DEV){
  setupDevMode();
  const b=document.getElementById("fbBanner");if(b){b.style.background="#6d5cff";b.style.color="#fff";b.textContent="🧪 ДЕМО-режим — работа без Firebase, изменения не сохраняются. Роль: "+session.role+" · ?role=admin|player|banker|auditor";}
  render();
} else if(CONFIG_OK){
  setFbStatus("connecting");
  try{
    app=initializeApp(firebaseConfig);auth=getAuth(app);db=getFirestore(app);
    onAuthStateChanged(auth,async u=>{if(u){uidAuth=u.uid;await firebaseSelfTest();if(session.code)subscribeRoom(session.code);else render();}});
    signInAnonymously(auth).catch(e=>{setFbStatus("autherror",e&&(e.code||e.message));render();});
  }catch(e){setFbStatus("err",e&&e.message);render();}
  render();
  // фоллбэк: если за 4с вход не завершился — проверить связь с базой и показать причину
  setTimeout(()=>{const b=document.getElementById("fbBanner");if(b&&db&&/Подключение/.test(b.innerText))firebaseSelfTest();},4000);
} else { setFbStatus("noconfig"); render(); }
