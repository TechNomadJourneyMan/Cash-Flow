<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Digital Central Bank &amp; Global Exchange</title>
<style>
:root{
  --bg:#070b16; --bg2:#0c1426; --panel:#101a30; --panel2:#16223e; --line:#243153;
  --txt:#e9eefc; --muted:#8b9bc4; --acc:#4f8cff; --acc2:#6ea0ff;
  --green:#22c55e; --red:#ef4444; --orange:#f59e0b; --purple:#a855f7;
  --blue:#3b82f6; --gold:#fbbf24; --gray:#64748b; --teal:#14b8a6; --yellow:#eab308;
  --radius:14px; --shadow:0 12px 34px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(1000px 700px at 85% -10%,#13203f 0%,var(--bg) 55%) fixed;
  color:var(--txt);font-size:15px;line-height:1.45;-webkit-text-size-adjust:100%}
.wrap{max-width:1180px;margin:0 auto;padding:10px 12px 110px}
h1,h2,h3{margin:0 0 8px}
button{font-family:inherit;cursor:pointer}
.muted{color:var(--muted)} .small{font-size:12.5px} .hidden{display:none!important}
.mono{font-variant-numeric:tabular-nums}

/* top bar */
.topbar{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,var(--bg) 75%,transparent);
  padding:10px 0 6px;backdrop-filter:blur(6px)}
.tb-main{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{font-size:24px}
.tb-title{font-weight:800;font-size:17px;letter-spacing:.2px}
.tb-sub{font-size:11px;color:var(--muted)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:var(--panel)}
.chip b{color:var(--acc2)}
.role-switch{display:flex;gap:4px;margin-left:auto;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:3px}
.role-switch button{border:none;background:transparent;color:var(--muted);font-weight:700;font-size:12px;padding:6px 11px;border-radius:999px}
.role-switch button.on{background:linear-gradient(135deg,var(--acc),#3a6bff);color:#fff}

/* tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 0}
.tab{flex:0 0 auto;padding:8px 13px;border-radius:999px;border:1px solid var(--line);background:var(--panel);
  color:var(--muted);font-weight:600;font-size:12.5px;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,var(--acc),#3a6bff);color:#fff;border-color:transparent}

/* cards */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:13px;box-shadow:var(--shadow)}
.card h2{font-size:16px}
.grid{display:grid;gap:11px}
.g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)} .g5{grid-template-columns:repeat(5,1fr)}
@media(max-width:820px){.g4,.g5{grid-template-columns:repeat(3,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}.g2.keep,.g4.keep,.g3.keep{grid-template-columns:repeat(2,1fr)}}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center} .spread{justify-content:space-between}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:4px 0 8px}
hr.sep{border:none;border-top:1px solid var(--line);margin:13px 0}

.stat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:11px}
.stat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.stat .v{font-size:19px;font-weight:800;margin-top:3px}

/* buttons */
.btn{border:1px solid var(--line);background:var(--panel2);color:var(--txt);padding:10px 13px;border-radius:11px;font-weight:600;font-size:13.5px;transition:.12s}
.btn:hover{transform:translateY(-1px);border-color:var(--acc)}
.btn.primary{background:linear-gradient(135deg,var(--acc),#3a6bff);border-color:transparent;color:#fff}
.btn.green{background:linear-gradient(135deg,#16a34a,#22c55e);border-color:transparent;color:#fff}
.btn.red{background:linear-gradient(135deg,#dc2626,#ef4444);border-color:transparent;color:#fff}
.btn.purple{background:linear-gradient(135deg,#9333ea,#a855f7);border-color:transparent;color:#fff}
.btn.gold{background:linear-gradient(135deg,#d97706,#fbbf24);border-color:transparent;color:#1a1300}
.btn.blue{background:linear-gradient(135deg,#2563eb,#3b82f6);border-color:transparent;color:#fff}
.btn.teal{background:linear-gradient(135deg,#0d9488,#14b8a6);border-color:transparent;color:#fff}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:9px}
.btn.block{width:100%;justify-content:center;text-align:center;display:block}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-money{padding:8px 0;border-radius:9px;font-weight:700;font-size:12.5px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
.btn-money.plus{color:#bbf7d0;border-color:#1f6f43} .btn-money.plus:hover{background:#11331f}
.btn-money.minus{color:#fecaca;border-color:#7f2b2b} .btn-money.minus:hover{background:#3a1414}

/* inputs */
input,select,textarea{font-family:inherit;font-size:14px;color:var(--txt);background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
textarea{resize:vertical;min-height:54px}
label.fl{display:block;font-size:11.5px;color:var(--muted);margin:0 0 4px}
.field{margin-bottom:9px}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:999px;border:1px solid transparent}
.b-green{background:rgba(34,197,94,.15);color:#86efac;border-color:rgba(34,197,94,.35)}
.b-red{background:rgba(239,68,68,.15);color:#fca5a5;border-color:rgba(239,68,68,.35)}
.b-orange{background:rgba(245,158,11,.15);color:#fcd34d;border-color:rgba(245,158,11,.35)}
.b-purple{background:rgba(168,85,247,.15);color:#d8b4fe;border-color:rgba(168,85,247,.35)}
.b-blue{background:rgba(59,130,246,.15);color:#93c5fd;border-color:rgba(59,130,246,.35)}
.b-gold{background:rgba(251,191,36,.15);color:#fde68a;border-color:rgba(251,191,36,.4)}
.b-gray{background:rgba(100,116,139,.18);color:#cbd5e1;border-color:rgba(100,116,139,.4)}
.b-teal{background:rgba(20,184,166,.15);color:#5eead4;border-color:rgba(20,184,166,.35)}
.b-yellow{background:rgba(234,179,8,.15);color:#fde047;border-color:rgba(234,179,8,.4)}

/* list item / player */
.item{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:9px}
.item.neg{border-color:var(--red);box-shadow:0 0 0 1px rgba(239,68,68,.25) inset}
.pname{font-weight:800;font-size:15px}
.pbal{font-weight:800;font-size:17px}
.team-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
.tag-chip{font-size:10px;padding:2px 7px;border-radius:999px;background:var(--bg2);border:1px solid var(--line);color:var(--muted);cursor:pointer;display:inline-block;margin:2px 1px}
.tag-chip.on{background:rgba(79,140,255,.2);border-color:var(--acc);color:#cdd9ff}
.flash-up{animation:fu .8s} .flash-down{animation:fd .8s}
@keyframes fu{0%{background:rgba(34,197,94,.4)}100%{background:var(--panel2)}}
@keyframes fd{0%{background:rgba(239,68,68,.4)}100%{background:var(--panel2)}}

/* exchange */
.asset{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px}
.spark{width:100%;height:38px;display:block}
.price{font-size:20px;font-weight:800}
.chg-up{color:var(--green)} .chg-down{color:var(--red)}

/* economy bars */
.econ-row{margin-bottom:8px}
.econ-row .lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bar{height:7px;border-radius:6px;background:var(--bg2);overflow:hidden}
.bar>span{display:block;height:100%;border-radius:6px;transition:width .5s}
.risk-meter{height:13px;border-radius:8px;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);position:relative;overflow:hidden}
.risk-meter .knob{position:absolute;top:-3px;width:4px;height:19px;background:#fff;border-radius:3px;box-shadow:0 0 6px #000;transition:left .6s}

/* event card */
.event-card{border-radius:14px;padding:15px;border:1px solid var(--line);background:var(--panel2);position:relative;overflow:hidden}
.event-card.appear{animation:cin .4s cubic-bezier(.2,.8,.2,1)}
@keyframes cin{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
.edge{height:5px;border-radius:5px;width:54px;margin-bottom:4px}
.etitle{font-size:17px;font-weight:800;margin:8px 0}
.shuffling{text-align:center;padding:26px;color:var(--muted);animation:pls 1s infinite}
@keyframes pls{50%{opacity:.5}}
.choice{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:10px;margin-top:7px}
.choice:hover{border-color:var(--acc)}

/* history */
.hitem{border-left:3px solid var(--line);padding:7px 10px;margin-bottom:6px;background:var(--bg2);border-radius:0 9px 9px 0}
.hitem .ht{font-weight:700;font-size:13px} .hitem .hm{font-size:11px;color:var(--muted)}

/* progress */
.prog{height:8px;border-radius:6px;background:var(--bg2);overflow:hidden;margin:6px 0}
.prog>span{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--green))}

/* modal / toast / fullscreen event */
.overlay{position:fixed;inset:0;background:rgba(3,6,16,.74);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;max-width:540px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow)}
.fs-event{max-width:520px;text-align:center;border:2px solid var(--purple)}
.toast-wrap{position:fixed;left:0;right:0;bottom:78px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none}
.toast{background:var(--panel);border:1px solid var(--acc);color:var(--txt);padding:10px 15px;border-radius:11px;font-weight:600;font-size:13px;box-shadow:var(--shadow);animation:cin .3s;max-width:92vw}
.toast.ach{border-color:var(--gold);background:linear-gradient(135deg,#2a2200,#101a30)}
.toast.warn{border-color:var(--red)}

/* bottom nav (player) */
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--panel);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px}
.bn{flex:1;text-align:center;color:var(--muted);font-size:10.5px;font-weight:600;padding:4px 2px;border-radius:9px}
.bn .ic{font-size:18px;display:block}
.bn.on{color:var(--acc2)}

.warn-box{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fecaca;padding:9px;border-radius:9px;font-size:12.5px}
.ok-box{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.35);color:#bbf7d0;padding:9px;border-radius:9px;font-size:12.5px}
.info-box{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.35);color:#bfdbfe;padding:9px;border-radius:9px;font-size:12.5px}
.pickbox{max-height:170px;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:8px;background:var(--bg2)}
.pick{display:flex;align-items:center;gap:8px;padding:4px 0}
.scroll{overflow:auto}
table.tx{width:100%;border-collapse:collapse;font-size:12px}
table.tx th,table.tx td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
table.tx th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="tb-main">
      <div class="logo">🏛️</div>
      <div>
        <div class="tb-title">Digital Central Bank &amp; Global Exchange</div>
        <div class="tb-sub">Неофициальный цифровой игровой модуль для финансовых настольных игр в стиле CashFlow</div>
      </div>
      <div class="role-switch" id="roleSwitch"></div>
    </div>
    <div class="chips" id="chips"></div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div id="view"></div>
</div>
<div id="bottomNav"></div>
<div id="modalRoot"></div>
<div class="toast-wrap" id="toasts"></div>
<script>

];

const MODES=[
  {id:"basic",name:"Базовый",desc:"Обычная вероятность событий."},
  {id:"realistic",name:"Реалистичная экономика",desc:"События зависят от состояния экономики."},

  {id:"opportunity",name:"Возможности",desc:"Чаще позитив и стратегии."},

const LS_KEY="dcb_v1";
function defaultEconomy(){return{inflation:35,rate:30,realEstate:55,stocks:55,unemployment:40,business:55,sentiment:55,liquidity:55,creditAccess:55};}
function defaultRoom(){
  return {code:"CASH-2026",name:"Большая игра",phase:"start",round:1,mode:"basic",trendId:"growth",
    riskIndex:35, centralBankRate:10,
    settings:{startBalance:5000, transferLimit:5000, loanLimit:20000, loanRate:10, paydaySpamGuard:true, negativeAllowed:true, bankerPin:"1111", adminPin:"0000"}};
}
function defaultState(){
  return {
    room:defaultRoom(), economy:defaultEconomy(),
    users:[], teams:[], tables:[], transactions:[], loans:[], assets:[], trades:[],
    pools:[], startups:[], offers:[], approvals:[], news:[], history:[], audit:[], achievements:[],
    lastEventIds:[], counters:{events:0,crises:0,opportunities:0,decisions:0,moneyOps:0,trades:0,dice:0,poolsClosed:0,ventureBridges:0},
    role:"admin", activeUserId:null, activeTableId:null,
    tab:{admin:"dash",banker:"players",player:"wallet"}, uid:1, setup:false
  };
}
let state = load() || null;
function load(){try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){toast("Не удалось сохранить",1);}}
function nextId(){return state.uid++;}

/* ---------- HELPERS ---------- */
function fmt(n){n=Math.round(n);return (n<0?"-":"")+"$"+Math.abs(n).toLocaleString("ru-RU");}
function nowStr(){const d=new Date();return d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function clamp(n,a,b){return Math.max(a,Math.min(b,n));}
function byId(a,id){return a.find(x=>x.id===id);}
function user(id){return byId(state.users,id);}
function trend(){return byId(TRENDS,state.room.trendId)||TRENDS[0];}
function mode(){return MODES.find(m=>m.id===state.room.mode)||MODES[0];}
function phase(){return PHASES.find(p=>p.id===state.room.phase)||PHASES[0];}
function totalCapital(){return state.users.reduce((s,u)=>s+u.balance,0);}
function tableName(id){const t=byId(state.tables,id);return t?t.name:"—";}
function teamName(id){const t=byId(state.teams,id);return t?t.name:"Без команды";}
function teamColor(id){const t=byId(state.teams,id);return t?t.color:"#64748b";}
function tableMembers(id){return state.users.filter(u=>u.tableId===id&&u.role==="player");}
function teamMembers(id){return state.users.filter(u=>u.teamId===id);}
function players(){return state.users.filter(u=>u.role==="player");}
function asset(sym){return state.assets.find(a=>a.symbol===sym);}

function toast(msg,warn){
  const w=document.getElementById("toasts");const el=document.createElement("div");
  el.className="toast"+(warn===1?" warn":warn===2?" ach":"");el.innerHTML=msg;w.appendChild(el);
  setTimeout(()=>{el.style.transition="opacity .4s";el.style.opacity="0";setTimeout(()=>el.remove(),400);},2800);
}
function modal(title,body,buttons,cls){
  const root=document.getElementById("modalRoot");const ov=document.createElement("div");ov.className="overlay";
  ov.innerHTML='<div class="modal '+(cls||"")+'"><h2>'+esc(title)+'</h2><div>'+body+'</div><div class="row" style="margin-top:14px;justify-content:flex-end"></div></div>';
  const close=()=>ov.remove();ov.addEventListener("click",e=>{if(e.target===ov)close();});
  const brow=ov.querySelector(".row");
  (buttons||[{label:"Закрыть",cls:"btn"}]).forEach(b=>{const bb=document.createElement("button");bb.className="btn "+(b.cls||"");bb.textContent=b.label;bb.onclick=()=>{if(b.onClick)b.onClick(close,ov);else close();};brow.appendChild(bb);});
  root.appendChild(ov);return ov;
}
function confirmModal(t,txt,onYes,yesLabel,yesCls){modal(t,'<p>'+esc(txt)+'</p>',[{label:"Отмена",cls:"ghost"},{label:yesLabel||"Подтвердить",cls:yesCls||"red",onClick:c=>{c();onYes();}}]);}

function logHistory(type,title,desc,extra){
  state.history.unshift(Object.assign({n:state.history.length+1,round:state.room.round,type,title,desc:desc||"",time:nowStr()},extra||{}));
  if(state.history.length>500)state.history.pop();
}
function logAudit(action,entityType,entityId,extra){
  state.audit.unshift(Object.assign({id:"A"+nextId(),actor:state.role,action,entityType,entityId,time:nowStr()},extra||{}));
  if(state.audit.length>500)state.audit.pop();
}
function logNews(title,body,type,priority){
  state.news.unshift({id:"N"+nextId(),title,body:body||"",type:type||"info",priority:priority||"normal",time:nowStr()});
  if(state.news.length>200)state.news.pop();
}
// Денежная транзакция (единственный способ менять баланс)
function tx(o){
  o.id="T"+nextId();o.roomCode=state.room.code;o.round=state.room.round;o.time=nowStr();
  o.status=o.status||"completed";o.createdBy=o.createdBy||state.role;
  state.transactions.unshift(o);state.counters.moneyOps++;
  if(state.transactions.length>1000)state.transactions.pop();
}
function unlock(id){
  if(state.achievements.includes(id))return;const a=byId(ACHIEVEMENTS,id);if(!a)return;
  state.achievements.push(id);logHistory("achievement","Достижение: "+a.title,a.desc);toast(a.icon+" Достижение: <b>"+esc(a.title)+"</b>",2);
}
function checkAch(){
  const c=state.counters;
  if(players().length>=1)unlock("first_player");
  if(state.teams.length>=1)unlock("first_team");
  if(c.crises>=1)unlock("first_crisis");
  if(c.crises>=3)unlock("storm");
  if(state.room.riskIndex>=80)unlock("hot_economy");
  if(state.room.riskIndex<20)unlock("calm");
  if(c.opportunities>=5)unlock("opp_hunter");
  if(c.events>=20)unlock("econ_storm");
  if(c.moneyOps>=20)unlock("banker");
  if(totalCapital()>=100000)unlock("big_capital");
  if(c.trades>=20)unlock("exchange_day");
  if(c.poolsClosed>=1)unlock("syndicate");
  if(c.ventureBridges>=1)unlock("venture_bridge");
  if(c.dice>=5)unlock("dice_master");
}
function applyEconomy(delta){if(!delta)return;const e=state.economy;for(const k in delta){if(k==="risk"){state.room.riskIndex=clamp(state.room.riskIndex+delta.risk,0,100);continue;}if(e[k]!=null)e[k]=clamp(e[k]+delta[k],0,100);}checkAch();}
function flash(id,up){setTimeout(()=>{const el=document.querySelector('[data-pcard="'+id+'"]');if(el){el.classList.remove("flash-up","flash-down");void el.offsetWidth;el.classList.add(up?"flash-up":"flash-down");}},20);}

/* ---------- MONEY ---------- */
// Базовое изменение баланса игрока с транзакцией
function applyDelta(u, delta, type, reason, extra){
  const before=u.balance; u.balance=Math.round(before+delta); u.updatedAt=nowStr();
  tx(Object.assign({type:type, targetType:"player", targetName:u.name, playerId:u.id,
    amount:Math.round(delta), reason:reason||"", balanceBefore:before, balanceAfter:u.balance,
    tableId:u.tableId, teamId:u.teamId},extra||{}));
  flash(u.id, delta>=0);
  if(u.balance<0) toast("⚠️ У «"+esc(u.name)+"» отрицательный баланс",1);
}
function changeMoney(uid, amount, reason, isIncome){
  const u=user(uid);if(!u)return;
  applyDelta(u, isIncome?Math.abs(amount):-Math.abs(amount), isIncome?"income":"expense", reason||(isIncome?"Начисление":"Списание"));
  checkAch();save();render();
}
function transfer(fromId,toId,amount,comment){
  if(fromId===toId){toast("⚠️ Нельзя перевести самому себе",1);return false;}
  const a=user(fromId),b=user(toId);if(!a||!b){toast("⚠️ Выберите игроков",1);return false;}
  amount=Math.abs(amount);if(!amount){toast("⚠️ Укажите сумму",1);return false;}
  const lim=state.room.settings.transferLimit;
  if(amount>lim){ // крупный перевод → подтверждение
    state.approvals.unshift({id:"AP"+nextId(),type:"transfer",requestedBy:a.name,fromId,toId,amount,reason:comment||"P2P-перевод",tableId:a.tableId,status:"pending",time:nowStr()});
    logHistory("approval","Перевод на подтверждение","'"+a.name+"' → '"+b.name+"' "+fmt(amount));
    toast("⏳ Крупный перевод отправлен на подтверждение банкиру");save();render();return true;
  }
  doTransfer(fromId,toId,amount,comment||"P2P-перевод");
  return true;
}
function doTransfer(fromId,toId,amount,reason){
  const a=user(fromId),b=user(toId);
  applyDelta(a,-amount,"transfer",reason,{fromPlayer:a.name,toPlayer:b.name});
  applyDelta(b,+amount,"transfer",reason,{fromPlayer:a.name,toPlayer:b.name});
  logHistory("money","Перевод: "+a.name+" → "+b.name,fmt(amount)+" — "+reason);
  checkAch();save();render();toast("✅ Перевод выполнен");
}
// Применить денежный эффект к набору игроков (события, массовые операции)
function applyMoneyEffect(list, eff, reason, type){
  list.forEach(u=>{
    let delta=0;
    switch(eff.moneyEffectType){
      case"add":delta=eff.moneyAmount;break;
      case"subtract":delta=-eff.moneyAmount;break;
      case"percentAdd":delta=Math.round(u.balance*eff.moneyPercent/100);break;
      case"percentSubtract":delta=-Math.round(u.balance*eff.moneyPercent/100);break;
      case"set":delta=eff.moneyAmount-u.balance;break;
      case"multiply":delta=Math.round(u.balance*eff.factor)-u.balance;break;
      default:return;
    }
    applyDelta(u,delta,type||eff.opType||"eventEffect",reason,{relatedEventId:eff.eventId||null});
  });
  checkAch();
}
function resolveTargets(rule,opts){
  opts=opts||{};
  if(rule==="all")return players();
  if(rule==="player")return opts.playerId?[user(opts.playerId)].filter(Boolean):[];
  if(rule==="team")return opts.teamId?teamMembers(opts.teamId):[];
  if(rule==="table")return opts.tableId?tableMembers(opts.tableId):[];
  if(rule&&rule.indexOf("tag:")===0)return players().filter(u=>u.tags.includes(rule.slice(4)));
  if(rule==="selected")return(opts.ids||[]).map(user).filter(Boolean);
  return [];
}
function massOperation(list,op){
  if(!list.length){toast("⚠️ Нет подходящих игроков",1);return;}
  let eff;
  if(op.kind==="add")eff={moneyEffectType:"add",moneyAmount:op.v,opType:"income"};
  else if(op.kind==="subtract")eff={moneyEffectType:"subtract",moneyAmount:op.v,opType:"expense"};
  else if(op.kind==="set")eff={moneyEffectType:"set",moneyAmount:op.v,opType:"setBalance"};
  else if(op.kind==="multiply")eff={moneyEffectType:"multiply",factor:op.v,opType:"percentChange"};
  else if(op.kind==="percentAdd")eff={moneyEffectType:"percentAdd",moneyPercent:op.v,opType:"percentChange"};
  else if(op.kind==="percentSubtract")eff={moneyEffectType:"percentSubtract",moneyPercent:op.v,opType:"percentChange"};
  applyMoneyEffect(list,eff,op.reason||"Массовая операция");
  logHistory("money","Массовая операция",op.reason+" — игроков: "+list.length);
  logAudit("massOperation","players",null,{count:list.length});
  save();render();
}

/* ---------- LOANS ---------- */
function takeLoan(uid,principal){
  const u=user(uid);if(!u)return;
  principal=Math.abs(principal);
  const lim=state.room.settings.loanLimit;
  const outstanding=state.loans.filter(l=>l.userId===uid&&l.status==="active").reduce((s,l)=>s+l.outstanding,0);
  if(outstanding+principal>lim){toast("⚠️ Превышен лимит кредита ("+fmt(lim)+")",1);return;}
  if(state.room.phase==="start"&&principal>5000){toast("⚠️ В фазе «Старт» кредиты ограничены 5 000$",1);return;}
  const rate=state.room.settings.loanRate;
  state.loans.unshift({id:"L"+nextId(),userId:uid,principal,outstanding:principal,rate,status:"active",createdAt:nowStr()});
  if(!u.tags.includes("есть кредиты"))u.tags.push("есть кредиты");
  if(!u.tags.includes("должник"))u.tags.push("должник");
  applyDelta(u,+principal,"loan","Заём в Центробанке (ставка "+rate+"%)");
  logHistory("loan","Кредит: "+u.name,fmt(principal)+" под "+rate+"%");
  logAudit("loan","user",uid,{amount:principal});
  checkAch();save();render();toast("✅ Заём выдан: "+fmt(principal));
}
function repayLoan(loanId,amount){
  const l=byId(state.loans,loanId);if(!l)return;const u=user(l.userId);
  amount=Math.min(Math.abs(amount),l.outstanding,Math.max(0,u.balance));
  if(amount<=0){toast("⚠️ Недостаточно средств или долг закрыт",1);return;}
  l.outstanding-=amount;applyDelta(u,-amount,"loanRepay","Погашение кредита");
  if(l.outstanding<=0){l.status="closed";
    if(!state.loans.some(x=>x.userId===u.id&&x.status==="active")){u.tags=u.tags.filter(t=>t!=="должник");}}
  logHistory("loan","Погашение: "+u.name,fmt(amount));save();render();toast("✅ Погашено "+fmt(amount));
}
// Проценты при «Дне получки»
function loanInterestFor(uid){
  return state.loans.filter(l=>l.userId===uid&&l.status==="active").reduce((s,l)=>s+Math.round(l.outstanding*l.rate/100),0);
}
/* ---------- PLAYERS / TEAMS / TABLES ---------- */
function addPlayer(name,balance,tableId,teamId,role){
  name=(name||"").trim();if(!name){toast("⚠️ Введите имя игрока",1);return false;}
  const u={id:"U"+nextId(),roomCode:state.room.code,name,role:role||"player",
    tableId:tableId||null,teamId:teamId||null,status:"ratrace",
    balance:isFinite(balance)?balance:state.room.settings.startBalance,
    notes:"",tags:[],portfolio:{},isActive:true,isOnline:true,createdAt:nowStr(),updatedAt:nowStr()};
  state.users.push(u);
  if(u.role==="player"&&u.balance!==0)tx({type:"income",targetType:"player",targetName:u.name,playerId:u.id,amount:u.balance,reason:"Стартовый баланс",balanceBefore:0,balanceAfter:u.balance,tableId:u.tableId,teamId:u.teamId});
  logHistory("player","Добавлен игрок: "+name,"Стол: "+tableName(tableId)+", баланс "+fmt(u.balance));
  logAudit("addPlayer","user",u.id);checkAch();save();render();return true;
}
function deletePlayer(id){const u=user(id);if(!u)return;state.users=state.users.filter(x=>x.id!==id);
  logHistory("player","Удалён игрок: "+u.name,"Баланс "+fmt(u.balance));logAudit("deletePlayer","user",id);save();render();}
function updatePlayer(id,f){
  const u=user(id);if(!u)return;const ch=[];
  if(f.name&&f.name.trim()&&f.name!==u.name){ch.push("имя");u.name=f.name.trim();}
  if(f.balance!=null&&isFinite(f.balance)&&f.balance!==u.balance){applyDelta(u,f.balance-u.balance,"setBalance","Ручная корректировка");ch.push("баланс");}
  if(f.tableId!==undefined&&f.tableId!==u.tableId){u.tableId=f.tableId||null;ch.push("стол");}
  if(f.teamId!==undefined&&f.teamId!==u.teamId){u.teamId=f.teamId||null;ch.push("команда");}
  if(f.status&&f.status!==u.status){u.status=f.status;ch.push("статус");
    if(f.status==="fasttrack"&&!u.tags.includes("скоростная дорожка"))u.tags.push("скоростная дорожка");
    if(f.status==="venture"&&!u.tags.includes("венчурный инвестор"))u.tags.push("венчурный инвестор");}
  if(f.tags!=null)u.tags=f.tags;if(f.notes!=null)u.notes=f.notes;u.updatedAt=nowStr();
  if(ch.length){logHistory("player","Изменён игрок: "+u.name,ch.join(", "));logAudit("updatePlayer","user",id);}
  save();render();
}
function toggleTag(id,tag){const u=user(id);if(!u)return;if(u.tags.includes(tag))u.tags=u.tags.filter(t=>t!==tag);else u.tags.push(tag);u.updatedAt=nowStr();save();render();}
function addTeam(name,color){name=(name||"").trim();if(!name){toast("⚠️ Введите название",1);return;}
  state.teams.push({id:"TM"+nextId(),roomCode:state.room.code,name,color:color||"#14b8a6",notes:"",createdAt:nowStr()});
  logHistory("team","Создана команда: "+name);checkAch();save();render();}
function deleteTeam(id){const t=byId(state.teams,id);if(!t)return;state.users.forEach(u=>{if(u.teamId===id)u.teamId=null;});state.teams=state.teams.filter(x=>x.id!==id);logHistory("team","Удалена команда: "+t.name);save();render();}
function updateTeam(id,f){const t=byId(state.teams,id);if(!t)return;if(f.name)t.name=f.name.trim();if(f.color)t.color=f.color;if(f.notes!=null)t.notes=f.notes;logHistory("team","Изменена команда: "+t.name);save();render();}

/* ---------- EXCHANGE ---------- */
function priceTick(){
  let range=[-8,8];const ph=state.room.phase;
  if(ph==="crisis"||state.room.mode==="crisis")range=[-25,10];
  else if(state.room.riskIndex>70)range=[-18,8];
  else if(state.room.riskIndex<30)range=[-5,15];
  state.assets.forEach(a=>{
    if(a.isHalted)return;
    const pct=range[0]+Math.random()*(range[1]-range[0]);
    a.previousPrice=a.price;a.price=Math.max(1,Math.round(a.price*(1+pct/100)));
    a.history.push(a.price);if(a.history.length>40)a.history.shift();
  });
  logHistory("exchange","Котировки обновлены","Случайное движение рынка");save();render();
}
function shockAsset(sym,pct){
  const apply=(a)=>{a.previousPrice=a.price;a.price=Math.max(1,Math.round(a.price*(1+pct/100)));a.history.push(a.price);if(a.history.length>40)a.history.shift();};
  if(sym==="all")state.assets.forEach(apply);else{const a=asset(sym);if(a)apply(a);}
  logHistory("marketShock","Биржевой шок: "+sym,(pct>0?"+":"")+pct+"%");logNews("Биржевой шок",sym+" "+(pct>0?"+":"")+pct+"%","market","high");save();render();
}
function setAssetPrice(sym,price){const a=asset(sym);if(!a)return;a.previousPrice=a.price;a.price=Math.max(1,Math.round(price));a.history.push(a.price);save();render();}
function applyStockEffects(eff){
  if(!eff)return;
  for(const k in eff){if(k==="all"){state.assets.forEach(a=>{a.previousPrice=a.price;a.price=Math.max(1,Math.round(a.price*(1+eff.all/100)));a.history.push(a.price);if(a.history.length>40)a.history.shift();});}
    else{const a=asset(k);if(a){a.previousPrice=a.price;a.price=Math.max(1,Math.round(a.price*(1+eff[k]/100)));a.history.push(a.price);if(a.history.length>40)a.history.shift();}}}
}
function tradeAsset(uid,sym,qty,isBuy){
  const u=user(uid),a=asset(sym);if(!u||!a)return;
  qty=Math.floor(Math.abs(qty));if(!qty){toast("⚠️ Укажите количество",1);return;}
  const fee=Math.round(a.price*qty*0.01); // комиссия 1%
  if(isBuy){
    const cost=a.price*qty+fee;
    if(u.balance<cost){toast("⚠️ Недостаточно средств",1);return;}
    const pf=u.portfolio[sym]||{qty:0,avg:0};
    pf.avg=Math.round((pf.avg*pf.qty+a.price*qty)/(pf.qty+qty));pf.qty+=qty;u.portfolio[sym]=pf;
    applyDelta(u,-cost,"trade","Покупка "+qty+" "+sym+" (комиссия "+fmt(fee)+")");
    if(!u.tags.includes("есть акции"))u.tags.push("есть акции");
    if(!u.tags.includes("активный трейдер"))u.tags.push("активный трейдер");
  } else {
    const pf=u.portfolio[sym];if(!pf||pf.qty<qty){toast("⚠️ Недостаточно акций",1);return;}
    const proceeds=a.price*qty-fee;pf.qty-=qty;if(pf.qty<=0)delete u.portfolio[sym];
    applyDelta(u,+proceeds,"trade","Продажа "+qty+" "+sym+" (комиссия "+fmt(fee)+")");
  }
  state.trades.unshift({id:"TR"+nextId(),userId:uid,sym,type:isBuy?"buy":"sell",qty,price:a.price,fee,time:nowStr()});
  state.counters.trades++;logHistory("trade",(isBuy?"Покупка":"Продажа")+" "+sym,u.name+": "+qty+" @ "+fmt(a.price));
  checkAch();save();render();toast("✅ Сделка выполнена");
}
function portfolioValue(u){let v=0;for(const s in u.portfolio){const a=asset(s);if(a)v+=a.price*u.portfolio[s].qty;}return v;}

/* ---------- POOLS ---------- */
function createPool(creatorId,o){
  const u=user(creatorId);
  const p={id:"P"+nextId(),roomCode:state.room.code,creatorId,creatorTableId:u?u.tableId:null,
    title:o.title||"Инвестиционная сделка",dealType:o.dealType||"недвижимость",
    requiredAmount:o.requiredAmount||10000,collectedAmount:0,minContribution:o.minContribution||1000,
    expectedMonthlyIncome:o.expectedMonthlyIncome||2000,distributionMethod:"proportional",
    status:o.requiresApproval?"draft":"open",participants:[],bankerApprovalRequired:!!o.requiresApproval,
    approvedBy:null,createdAt:nowStr(),description:o.description||""};
  state.pools.unshift(p);
  if(u&&!u.tags.includes("участник пула"))u.tags.push("участник пула");
  if(p.status==="draft"){state.approvals.unshift({id:"AP"+nextId(),type:"pool",requestedBy:u?u.name:"—",poolId:p.id,amount:p.requiredAmount,reason:"Создание пула: "+p.title,tableId:u?u.tableId:null,status:"pending",time:nowStr()});toast("⏳ Пул отправлен на подтверждение банкиру");}
  else toast("✅ Пул создан и открыт");
  logHistory("pool","Создан пул: "+p.title,"Цель "+fmt(p.requiredAmount));logNews("Новый инвестиционный пул",p.title+" — нужно "+fmt(p.requiredAmount),"pool","normal");
  save();render();
}
function joinPool(poolId,uid,amount){
  const p=byId(state.pools,poolId),u=user(uid);if(!p||!u)return;
  if(p.status!=="open"&&p.status!=="funding"){toast("⚠️ Пул не принимает взносы",1);return;}
  amount=Math.abs(amount);
  if(amount<p.minContribution){toast("⚠️ Минимальный вклад "+fmt(p.minContribution),1);return;}
  if(u.balance<amount){toast("⚠️ Недостаточно средств",1);return;}
  const remaining=p.requiredAmount-p.collectedAmount;if(amount>remaining)amount=remaining;
  applyDelta(u,-amount,"poolContribution","Вклад в пул: "+p.title);
  const ex=p.participants.find(x=>x.userId===uid);
  if(ex)ex.contribution+=amount;else p.participants.push({userId:uid,contribution:amount,joinedAt:nowStr()});
  p.collectedAmount+=amount;p.status="funding";
  if(!u.tags.includes("участник пула"))u.tags.push("участник пула");
  if(p.collectedAmount>=p.requiredAmount){p.status="active";logHistory("pool","Пул собран: "+p.title,fmt(p.collectedAmount));logNews("Пул закрыт","'"+p.title+"' собрал нужную сумму и активен","pool","normal");state.counters.poolsClosed++;unlock("syndicate");}
  // пересчёт долей
  p.participants.forEach(pt=>pt.share=Math.round(pt.contribution/p.collectedAmount*1000)/10);
  logHistory("pool","Взнос в пул: "+p.title,u.name+" "+fmt(amount));save();render();toast("✅ Вы в пуле");
}
function poolPayout(poolId){
  const p=byId(state.pools,poolId);if(!p||p.status!=="active"){toast("⚠️ Пул не активен",1);return;}
  p.participants.forEach(pt=>{const u=user(pt.userId);if(!u)return;const pay=Math.round(p.expectedMonthlyIncome*pt.contribution/p.collectedAmount);applyDelta(u,+pay,"poolPayout","Выплата по пулу: "+p.title);});
  logHistory("pool","Выплата по пулу: "+p.title,"Доход "+fmt(p.expectedMonthlyIncome));save();render();toast("✅ Выплаты по пулу начислены");
}
function closePool(poolId){const p=byId(state.pools,poolId);if(!p)return;p.status="closed";p.closedAt=nowStr();logHistory("pool","Пул закрыт: "+p.title);logAudit("closePool","pool",poolId);save();render();}

/* ---------- VENTURE / STARTUPS ---------- */
function createStartup(creatorId,o){
  const u=user(creatorId);
  state.startups.unshift({id:"S"+nextId(),creatorId,creatorName:u?u.name:"—",tableId:u?u.tableId:null,
    type:o.type||"Ищу инвестора",title:o.title||"Сделка",requestedAmount:o.requestedAmount||5000,
    offeredShare:o.offeredShare||20,expectedIncome:o.expectedIncome||1000,description:o.description||"",
    status:"open",createdAt:nowStr()});
  logHistory("venture","Заявка стартапа: "+(o.title||"Сделка"),(u?u.name:"—")+" ищет "+fmt(o.requestedAmount||5000));
  logNews("Новая венчурная заявка",(u?u.name:"—")+": "+(o.title||"Сделка"),"venture","normal");save();render();toast("✅ Заявка размещена");
}
function makeOffer(reqId,investorId,amount,offerType,terms){
  const s=byId(state.startups,reqId),inv=user(investorId);if(!s||!inv)return;
  state.offers.unshift({id:"OF"+nextId(),requestId:reqId,investorId,investorName:inv.name,amount:Math.abs(amount),offerType:offerType||"доля",terms:terms||"",status:"open",time:nowStr()});
  if(s.status==="open")s.status="negotiating";
  logHistory("venture","Предложение по заявке","'"+inv.name+"' предлагает "+fmt(amount));save();render();toast("✅ Предложение отправлено");
}
function acceptOffer(offerId){
  const of=byId(state.offers,offerId);if(!of)return;const s=byId(state.startups,of.requestId);
  const inv=user(of.investorId),creator=user(s.creatorId);if(!inv||!creator)return;
  if(inv.balance<of.amount){toast("⚠️ У инвестора недостаточно средств",1);return;}
  applyDelta(inv,-of.amount,"startupInvestment","Венчур: "+s.title+" (инвестор)",{toPlayer:creator.name});
  applyDelta(creator,+of.amount,"startupInvestment","Венчур: "+s.title+" (получатель)",{fromPlayer:inv.name});
  of.status="accepted";s.status="funded";
  if(inv.tags.includes("венчурный инвестор")||inv.tags.includes("скоростная дорожка")){state.counters.ventureBridges++;unlock("venture_bridge");}
  logHistory("venture","Венчурная сделка закрыта",inv.name+" → "+creator.name+" "+fmt(of.amount));
  logNews("Венчурный мост",inv.name+" профинансировал "+creator.name,"venture","high");
  checkAch();save();render();toast("✅ Сделка закрыта");
}

/* ---------- PAYDAY ---------- */
function paydayPreview(uid){
  const u=user(uid);if(!u)return null;
  const interest=loanInterestFor(uid);
  let poolIncome=0;state.pools.filter(p=>p.status==="active").forEach(p=>{const pt=p.participants.find(x=>x.userId===uid);if(pt)poolIncome+=Math.round(p.expectedMonthlyIncome*pt.contribution/p.collectedAmount);});
  const net=poolIncome-interest;
  return {interest,poolIncome,net,before:u.balance,after:u.balance+net};
}
function doPayday(uid){
  const u=user(uid),pv=paydayPreview(uid);if(!u||!pv)return;
  if(pv.interest>0)applyDelta(u,-pv.interest,"loanInterest","Проценты по кредитам (День получки)");
  if(pv.poolIncome>0)applyDelta(u,+pv.poolIncome,"poolPayout","Доход от пулов (День получки)");
  logHistory("payday","День получки: "+u.name,"Проценты -"+fmt(pv.interest)+", пулы +"+fmt(pv.poolIncome));
  checkAch();save();render();toast("💵 День получки: итог "+(pv.net>=0?"+":"")+fmt(pv.net));
}
/* ---------- EVENTS ENGINE ---------- */
let lastEvent=null, categoryFilter="all";
function eventWeight(ev){
  let w=RARITY_META[ev.rarity].w;const md=state.room.mode,tr=trend(),risk=state.room.riskIndex;
  if(md==="crisis"){if(ev.type==="crisis"||ev.type==="negative")w*=2.4;}
  if(md==="opportunity"){if(ev.type==="opportunity"||ev.type==="positive"||ev.type==="decision")w*=2.2;}
  if(md==="chaos")w*=(.5+Math.random()*1.8);
  if(md==="team"){if(ev.type==="team"||ev.category==="Командные события")w*=3.2;}
  if(md==="money"){if(ev.autoApplicable&&ev.moneyEffectType!=="none")w*=2.2;}
  if(md==="market"){if(ev.type==="marketShock"||ev.category==="Биржевые события"||Object.keys(ev.stockEffects).length)w*=2.6;}
  if(md==="venture"){if(ev.type==="venture"||ev.category==="Венчурный рынок"||ev.category==="Инвестиционные пулы")w*=2.8;}
  if(md==="cross"){if(ev.category==="Межстоловые события")w*=3.2;}
  if(md==="realistic"){if(ev.type==="crisis")w*=1+risk/60;}
  if(ev.type==="crisis")w*=1+Math.max(0,(risk-50))/50;
  if(ev.type==="opportunity"||ev.type==="positive")w*=1+Math.max(0,(50-risk))/80;
  if(state.room.phase==="crisis"&&(ev.type==="crisis"||ev.type==="negative"))w*=1.8;
  if(state.room.phase==="final"&&(ev.type==="venture"||ev.category==="Венчурный рынок"))w*=1.8;
  if(state.room.phase==="start"&&ev.type==="crisis")w*=.3;
  if(tr.favor.includes(ev.category))w*=(1+tr.boost);
  return Math.max(.1,w);
}
function drawEvent(forcedType){
  let pool=EVENTS.filter(e=>categoryFilter==="all"||e.category===categoryFilter);
  if(forcedType)pool=EVENTS.filter(e=>e.type===forcedType);
  if(lastEvent&&pool.length>1)pool=pool.filter(e=>e.id!==lastEvent.id);
  if(pool.length>3)pool=pool.filter(e=>state.lastEventIds.slice(0,2).indexOf(e.id)<0);
  if(!pool.length)pool=EVENTS.slice();
  const ws=pool.map(eventWeight),sum=ws.reduce((a,b)=>a+b,0);let r=Math.random()*sum,idx=0;
  for(let i=0;i<pool.length;i++){r-=ws[i];if(r<=0){idx=i;break;}}
  return launchEvent(pool[idx]);
}
function launchEvent(ev){
  lastEvent=ev;state.lastEventIds.unshift(ev.id);if(state.lastEventIds.length>10)state.lastEventIds.pop();
  state.counters.events++;
  if(ev.type==="crisis")state.counters.crises++;
  if(ev.type==="opportunity")state.counters.opportunities++;
  applyEconomy(ev.economyImpact);
  if(ev.riskIndexDelta)state.room.riskIndex=clamp(state.room.riskIndex+ev.riskIndexDelta,0,100);
  if(ev.centralBankRateDelta)state.room.centralBankRate=clamp(state.room.centralBankRate+ev.centralBankRateDelta,0,60);
  // биржевые эффекты применяются сразу (видны всем)
  if(ev.stockEffects&&Object.keys(ev.stockEffects).length)applyStockEffects(ev.stockEffects);
  logHistory("event",ev.title,ev.category+" • "+TYPE_META[ev.type].label);
  logNews(ev.title,ev.playerMessage||ev.effect,ev.type==="crisis"?"crisis":"event",ev.impactLevel==="critical"?"high":"normal");
  logAudit("launchEvent","event",ev.id);
  checkAch();save();return ev;
}
function suitablePlayers(ev){
  if(ev.targetRule&&ev.targetRule.indexOf("tag:")===0)return players().filter(u=>u.tags.includes(ev.targetRule.slice(4)));
  if(ev.targetRule==="all")return players();
  return [];
}
function previewEffect(list,ev){
  return list.map(u=>{let after=u.balance;switch(ev.moneyEffectType){
    case"add":after=u.balance+ev.moneyAmount;break;case"subtract":after=u.balance-ev.moneyAmount;break;
    case"percentAdd":after=u.balance+Math.round(u.balance*ev.moneyPercent/100);break;
    case"percentSubtract":after=u.balance-Math.round(u.balance*ev.moneyPercent/100);break;
    case"set":after=ev.moneyAmount;break;}return{u,before:u.balance,after:Math.round(after)};});
}
function applyEventTo(ev,list){
  if(!list.length){toast("⚠️ Нет подходящих игроков",1);return;}
  if(ev.moneyEffectType==="none"||ev.moneyEffectType==="custom"){toast("ℹ️ Эффект применяется вручную",1);return;}
  const prev=previewEffect(list,ev);
  const rows=prev.map(x=>'<div class="row spread" style="border-bottom:1px solid var(--line);padding:5px 0"><span>'+esc(x.u.name)+'</span><span class="muted">'+fmt(x.before)+'</span> → <b style="color:'+(x.after>=x.before?'var(--green)':'var(--red)')+'">'+fmt(x.after)+'</b></div>').join("");
  const total=prev.reduce((s,x)=>s+(x.after-x.before),0);
  modal("Предпросмотр: "+ev.title,
    '<p class="small muted">'+esc(ev.effect)+'</p>'+rows+
    '<div class="row spread" style="margin-top:8px"><b>Общий эффект</b><b style="color:'+(total>=0?'var(--green)':'var(--red)')+'">'+fmt(total)+'</b></div>',
    [{label:"Отмена",cls:"ghost"},{label:"Применить",cls:"primary",onClick:c=>{
      const e2=Object.assign({},ev,{eventId:ev.id});applyMoneyEffect(list,e2,"Событие: "+ev.title,"eventEffect");
      logHistory("event","Применён эффект: "+ev.title,"Игроков: "+list.length);save();render();c();toast("✅ Эффект применён");
    }}]);
}
function applyChoice(ev,choice,opts){
  state.counters.decisions++;applyEconomy(choice.economyImpact);
  if(choice.stockEffects)applyStockEffects(choice.stockEffects);
  let effect=choice,label=null;
  if(choice.outcomes){const r=Math.random()*100;let acc=0,out=choice.outcomes[choice.outcomes.length-1];for(const o of choice.outcomes){acc+=o.chance;if(r<=acc){out=o;break;}}effect=out;label=out.label;if(out.stockEffects)applyStockEffects(out.stockEffects);}
  const rule=effect.targetRule||choice.targetRule||"player";const list=resolveTargets(rule,opts);
  if(effect.moneyEffectType&&effect.moneyEffectType!=="none"&&list.length){const e2=Object.assign({},effect,{eventId:ev.id});applyMoneyEffect(list,e2,"Решение: "+ev.title,"eventEffect");}
  logHistory("decision",ev.title,"Выбор: "+choice.text+(label?" → "+label:""));
  checkAch();save();render();toast("🧠 "+esc(label||choice.text));
}

function resolveApproval(id,ok){
  const ap=byId(state.approvals,id);if(!ap)return;
  ap.status=ok?"approved":"rejected";ap.approvedBy=state.role;ap.resolvedAt=nowStr();
  if(ok){
    if(ap.type==="transfer")doTransfer(ap.fromId,ap.toId,ap.amount,ap.reason);
    if(ap.type==="pool"){const p=byId(state.pools,ap.poolId);if(p){p.status="open";p.approvedBy=state.role;logNews("Пул одобрен",p.title,"pool","normal");}}
  } else { logHistory("approval","Отклонено: "+ap.type,ap.reason); }
  logAudit("approval","approval",id,{result:ok?"approved":"rejected"});save();render();toast(ok?"✅ Подтверждено":"❌ Отклонено");
}

function handleAct(act,el){
  const id=el.dataset.id, sym=el.dataset.sym;
  switch(act){
    case"setup":{setupRoom({name:val("suName"),code:val("suCode"),startBalance:parseFloat(val("suBal"))||5000,tables:parseInt(val("suTables"),10),assets:parseInt(val("suAssets"),10),venture:val("suVenture")==="yes",adminPin:val("suAdmin"),bankerPin:val("suBanker")});break;}
    case"event":{const ev=drawEvent();renderEventCard(ev);break;}
    case"crisis":{const ev=drawEvent("crisis");renderEventCard(ev);break;}
    case"uptrend":{const ev=drawEvent("positive");renderEventCard(ev);break;}
    case"dice":rollDice();break;
    case"next":nextRound();break;
    case"challenge":drawChallenge();break;
    case"opp":drawOpportunity();break;
    case"announce":announceModal();break;
    // players
    case"addPlayer":addPlayer(val("npName"),parseFloat(val("npBal")),val("npTable")||null,val("npTeam")||null);break;
    case"transfer":transfer(val("trFrom"),val("trTo"),parseFloat(val("trAmt"))||0,val("trCom"));break;
    case"custom":{const amt=parseFloat(document.querySelector('[data-cust="'+id+'"]').value)||0;const op=document.querySelector('[data-custop="'+id+'"]').value;const r=document.querySelector('[data-custr="'+id+'"]').value;if(!amt){toast("⚠️ Укажите сумму",1);break;}changeMoney(id,amt,r||(op==="income"?"Начисление":"Списание"),op==="income");break;}
    case"editPlayer":editPlayerModal(id);break;
    case"tagsPlayer":tagsModal(id);break;
    case"delPlayer":{const u=user(id);confirmModal("Удалить игрока?","«"+u.name+"» будет удалён.",()=>{deletePlayer(id);toast("🗑️ Удалён");},"Удалить","red");break;}
    case"paydayP":paydayModal(id);break;
    case"massApply":doMassApply();break;
    // teams
    case"addTeam":addTeam(val("tmName"),val("tmColor"));break;
    case"teamAdd":teamMoneyModal(id,true);break;
    case"teamSub":teamMoneyModal(id,false);break;
    case"teamAssign":teamAssignModal(id);break;
    case"teamEdit":teamEditModal(id);break;
    case"teamDel":{const t=byId(state.teams,id);confirmModal("Удалить команду?","«"+t.name+"» удалится, игроки станут «без команды».",()=>{deleteTeam(id);toast("🗑️ Удалена");},"Удалить","red");break;}
    case"tableAdd":tableMoneyModal(id,true);break;
    case"tableSub":tableMoneyModal(id,false);break;
    // exchange
    case"tick":priceTick();break;
    case"shockDown":shockAsset("all",-30);break;
    case"shockUp":shockAsset("all",20);break;
    case"setPrice":{const p=parseFloat(document.querySelector('[data-setp="'+sym+'"]').value);if(isFinite(p))setAssetPrice(sym,p);break;}
    case"halt":{const a=asset(sym);if(a){a.isHalted=!a.isHalted;save();render();}break;}
    case"buy":{const q=parseFloat(document.querySelector('[data-qty="'+sym+'"]').value)||0;tradeAsset(state.activeUserId,sym,q,true);break;}
    case"sell":{const q=parseFloat(document.querySelector('[data-qty="'+sym+'"]').value)||0;tradeAsset(state.activeUserId,sym,q,false);break;}
    // loans
    case"giveLoan":pickPlayerThen(u=>loanModal(u.id));break;
    case"plLoan":loanModal(state.activeUserId);break;
    case"repay":{const l=byId(state.loans,id);repayModal(l);break;}
    // pools
    case"createPool":case"plCreatePool":createPoolModal();break;
    case"joinPool":joinPoolModal(id);break;
    case"poolPay":poolPayout(id);break;
    case"poolClose":closePool(id);break;
    // venture
    case"createStartup":createStartupModal();break;
    case"makeOffer":makeOfferModal(id);break;
    case"acceptOffer":confirmModal("Принять предложение?","Деньги будут переведены инициатору.",()=>acceptOffer(id),"Принять","green");break;
    // player wallet
    case"plPayday":paydayModal(state.activeUserId);break;
    case"plToExchange":setTab("exchange");break;
    case"plTransfer":transfer(state.activeUserId,val("plTo"),parseFloat(val("plAmt"))||0,val("plCom"));break;
    case"plStatus":statusModal(id);break;
    // tx / history / settings
    case"exportCSV":exportCSV();break;
    case"copyTx":copyText(state.transactions.map(t=>t.targetName+": "+(t.amount>=0?"+":"")+fmt(t.amount)+" — "+t.reason).join("\n"));toast("📋 Скопировано");break;
    case"clearTx":confirmModal("Очистить транзакции?","История операций будет удалена.",()=>{state.transactions=[];save();render();toast("🗑️ Очищено");},"Очистить","red");break;
    case"copyHist":copyText(historyToText());toast("📋 Скопировано");break;
    case"exportHist":exportTextModal("История партии",historyToText());break;
    case"clearHist":confirmModal("Очистить историю?","История партии будет удалена.",()=>{state.history=[];save();render();toast("🗑️ Очищено");},"Очистить","red");break;
    case"saveSettings":saveSettings();break;
    case"backup":backupJSON();break;
    case"restore":restoreJSON();break;
    case"reset":resetAll();break;
  }
}
function historyToText(){let t="Digital Central Bank — комната "+state.room.code+"\nРаунд "+state.room.round+"\n\n=== ИСТОРИЯ ===\n";state.history.slice().reverse().forEach(h=>{t+="#"+h.n+" [р."+h.round+", "+h.time+"] "+h.title+(h.desc?" — "+h.desc:"")+"\n";});return t;}

/* ----- event card bindings ----- */
function bindEventCard(ev,el){
  el.querySelectorAll("[data-apply]").forEach(b=>{b.onclick=()=>{const m=b.dataset.apply;
    if(m==="skip"){toast("⏭️ Пропущено");logHistory("event","Пропущен эффект: "+ev.title);save();return;}
    if(m==="all"){applyEventTo(ev,players());return;}
    if(m==="suit"){applyEventTo(ev,suitablePlayers(ev));return;}
    if(m==="player"){pickPlayerThen(u=>applyEventTo(ev,[u]));return;}
    if(m==="team"){pickTeamThen(tid=>applyEventTo(ev,teamMembers(tid)));return;}
    if(m==="table"){pickTableThen(tid=>applyEventTo(ev,tableMembers(tid)));return;}
  };});
  el.querySelectorAll("[data-choice]").forEach(b=>{b.onclick=()=>{const c=ev.choices[parseInt(b.dataset.choice,10)];const rule=c.targetRule||"player";
    if(rule==="player")pickPlayerThen(u=>applyChoice(ev,c,{playerId:u.id}));
    else if(rule==="team")pickTeamThen(tid=>applyChoice(ev,c,{teamId:tid}));
    else applyChoice(ev,c,{});};});
  const cp=el.querySelector("[data-evcopy]");if(cp)cp.onclick=()=>{copyText(ev.title+"\n"+ev.category+"\n"+ev.description+"\nЭффект: "+ev.effect);toast("📋 Скопировано");};
  const nb=el.querySelector('[data-act="event"]');if(nb)nb.onclick=()=>{const e2=drawEvent();renderEventCard(e2);};
}

  modal("Вложиться в пул: "+p.title,who+'<div class="field"><label class="fl">Сумма (мин. '+fmt(p.minContribution)+')</label><input id="jpAmt" type="number" value="'+p.minContribution+'"></div>',[{label:"Отмена",cls:"ghost"},{label:"Вложиться",cls:"blue",onClick:(c,ov)=>{joinPool(poolId,ov.querySelector("#jpWho").value,parseFloat(ov.querySelector("#jpAmt").value)||0);c();}}]);}
function createStartupModal(){const who=state.role==="player"?'<input type="hidden" id="suWho" value="'+state.activeUserId+'">':'<div class="field"><label class="fl">Инициатор</label><select id="suWho">'+players().map(u=>'<option value="'+u.id+'">'+esc(u.name)+'</option>').join("")+'</select></div>';
  modal("🚀 Заявка на бирже стартапов",who+'<div class="field"><label class="fl">Тип</label><select id="suType"><option>Ищу инвестора</option><option>Продаю сделку</option><option>Ищу партнёра</option><option>Нужен заём</option><option>Готов отдать долю</option></select></div><div class="field"><label class="fl">Название</label><input id="suTitle" placeholder="Сделка"></div><div class="grid g2"><div class="field"><label class="fl">Нужно</label><input id="suReq" type="number" value="5000"></div><div class="field"><label class="fl">Доля, %</label><input id="suShare" type="number" value="20"></div></div><div class="field"><label class="fl">Ожидаемый доход</label><input id="suInc" type="number" value="1000"></div><div class="field"><label class="fl">Описание</label><textarea id="suDesc"></textarea></div>',
  [{label:"Отмена",cls:"ghost"},{label:"Разместить",cls:"gold",onClick:(c,ov)=>{createStartup(ov.querySelector("#suWho").value,{type:ov.querySelector("#suType").value,title:ov.querySelector("#suTitle").value,requestedAmount:parseFloat(ov.querySelector("#suReq").value)||5000,offeredShare:parseFloat(ov.querySelector("#suShare").value)||20,expectedIncome:parseFloat(ov.querySelector("#suInc").value)||1000,description:ov.querySelector("#suDesc").value});c();}}]);}
function makeOfferModal(reqId){const who=state.role==="player"?'<input type="hidden" id="moWho" value="'+state.activeUserId+'">':'<div class="field"><label class="fl">Инвестор</label><select id="moWho">'+players().map(u=>'<option value="'+u.id+'">'+esc(u.name)+' ('+fmt(u.balance)+')</option>').join("")+'</select></div>';
  modal("Предложение инвестора",who+'<div class="grid g2"><div class="field"><label class="fl">Сумма</label><input id="moAmt" type="number" value="5000"></div><div class="field"><label class="fl">Тип</label><select id="moType"><option>доля</option><option>покупка</option><option>заём</option><option>погашение долга</option><option>партнёрство</option></select></div></div><div class="field"><label class="fl">Условия</label><input id="moTerms" placeholder="Комментарий"></div>',
  [{label:"Отмена",cls:"ghost"},{label:"Отправить",cls:"blue",onClick:(c,ov)=>{makeOffer(reqId,ov.querySelector("#moWho").value,parseFloat(ov.querySelector("#moAmt").value)||0,ov.querySelector("#moType").value,ov.querySelector("#moTerms").value);c();}}]);}
function doMassApply(){const scope=val("msScope"),kind=val("msKind"),v=parseFloat(val("msVal"))||0,reason=val("msReason")||"Массовая операция";let list=[];
  if(scope==="all")list=players();else if(scope==="table")list=tableMembers(val("msTable"));else if(scope==="team")list=teamMembers(val("msTeam"));else if(scope==="tag")list=players().filter(u=>u.tags.includes(val("msTag")));else if(scope==="selected")list=[...document.querySelectorAll("#msPick input:checked")].map(c=>user(c.value)).filter(Boolean);
  if(!list.length){toast("⚠️ Нет игроков",1);return;}
  confirmModal("Массовая операция","Применить к "+list.length+" игрокам?",()=>massOperation(list,{kind,v,reason}),"Применить","primary");}
function announceModal(){modal("📢 Объявление всем",'<div class="field"><label class="fl">Заголовок</label><input id="anT" placeholder="Заголовок"></div><div class="field"><label class="fl">Текст</label><textarea id="anB"></textarea></div>',[{label:"Отмена",cls:"ghost"},{label:"Отправить",cls:"primary",onClick:(c,ov)=>{logNews(ov.querySelector("#anT").value||"Объявление",ov.querySelector("#anB").value,"info","high");logHistory("money","Объявление",ov.querySelector("#anT").value);save();render();c();toast("📢 Отправлено");}}]);}
function saveSettings(){const s=state.room.settings;s.startBalance=parseFloat(val("seStart"))||s.startBalance;s.transferLimit=parseFloat(val("seTrLimit"))||s.transferLimit;s.loanLimit=parseFloat(val("seLoanLimit"))||s.loanLimit;s.loanRate=parseFloat(val("seLoanRate"))||s.loanRate;state.room.centralBankRate=parseFloat(val("seCBR"))||state.room.centralBankRate;s.negativeAllowed=val("seNeg")==="1";logAudit("saveSettings","room",null);save();render();toast("✅ Настройки сохранены");}

function drawChallenge(){const c=pick(CHALLENGES);logHistory("challenge","Челлендж: "+c.title,c.description);save();
  modal("🎯 "+c.title,'<p>'+esc(c.description)+'</p><p class="small"><b>Кого касается:</b> '+esc(c.appliesTo)+'</p>'+(c.reward?'<p class="small ok-box">Награда: '+esc(c.reward)+'</p>':'')+(c.penalty?'<p class="small warn-box">Штраф: '+esc(c.penalty)+'</p>':''),
  [{label:"Закрыть",cls:"ghost"},{label:"Ещё",cls:"btn",onClick:cl=>{cl();drawChallenge();}}].concat(c.canAffectMoney?[{label:"Выдать игроку",cls:"green",onClick:cl=>{cl();pickPlayerThen(u=>{changeMoney(u.id,c.moneyEffect,"Награда челленджа: "+c.title,true);});}}]:[]));}
function drawOpportunity(){const o=pick(OPPORTUNITIES);state.counters.opportunities++;logHistory("opportunity","Возможность: "+o.title,o.description);checkAch();save();render();const rm=RARITY_META[o.rarity];
  modal("💎 "+o.title,'<p><span class="badge '+rm.badge+'">'+rm.label+'</span></p><p>'+esc(o.description)+'</p><p class="small"><b>Кого касается:</b> '+esc(o.appliesTo)+'</p><p class="small ok-box">Эффект: '+esc(o.effect)+'</p>',
  [{label:"Закрыть",cls:"ghost"},{label:"Ещё",cls:"btn",onClick:cl=>{cl();drawOpportunity();}}].concat(o.canAffectMoney?[{label:"Начислить игроку",cls:"blue",onClick:cl=>{cl();pickPlayerThen(u=>{changeMoney(u.id,o.moneyEffect,"Возможность: "+o.title,true);});}}]:[]));}

/* ---------- INIT ---------- */
render();

</script>
</body>
