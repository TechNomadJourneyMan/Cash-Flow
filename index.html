<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>CashFlow Events — симулятор экономики и калькулятор игроков</title>
<style>
:root{
  --bg:#0b1020; --bg2:#0f1730; --panel:#141d3a; --panel2:#1b264a; --line:#26315c;
  --txt:#e8edff; --muted:#93a0c8; --acc:#5b8cff; --acc2:#7aa2ff;
  --green:#22c55e; --red:#ef4444; --orange:#f59e0b; --purple:#a855f7;
  --blue:#3b82f6; --gold:#fbbf24; --gray:#64748b; --teal:#14b8a6; --money:#e2e8f0;
  --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(1200px 800px at 80% -10%,#16213f 0%,var(--bg) 55%) fixed;
  color:var(--txt); font-size:15px; line-height:1.45; -webkit-text-size-adjust:100%;
}
.wrap{max-width:1100px;margin:0 auto;padding:14px 14px 90px}
h1,h2,h3{margin:0 0 8px}
button{font-family:inherit;cursor:pointer}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.hidden{display:none!important}

/* Header */
.app-head{display:flex;align-items:center;gap:12px;padding:14px 4px 6px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column}
.brand .title{font-size:22px;font-weight:800;letter-spacing:.2px}
.brand .sub{font-size:12.5px;color:var(--muted)}
.brand .badge-unofficial{font-size:10.5px;color:var(--muted);margin-top:2px}

/* Tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 0;position:sticky;top:0;z-index:30;
  background:linear-gradient(180deg,var(--bg) 70%,transparent);backdrop-filter:blur(4px)}
.tab{flex:0 0 auto;padding:9px 14px;border-radius:999px;border:1px solid var(--line);
  background:var(--panel);color:var(--muted);font-weight:600;font-size:13px;white-space:nowrap;
  transition:.15s}
.tab.active{background:linear-gradient(135deg,var(--acc),#3a6bff);color:#fff;border-color:transparent}
.tab:hover{color:var(--txt)}

/* Cards & layout */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.card h2{font-size:17px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:760px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.g2,.g3,.g4{grid-template-columns:1fr}.g2.keep,.g4.keep{grid-template-columns:repeat(2,1fr)}}

.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.spread{justify-content:space-between}

/* Stat tiles */
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}
.stat .k{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.stat .v{font-size:20px;font-weight:800;margin-top:3px}

/* Buttons */
.btn{border:1px solid var(--line);background:var(--panel2);color:var(--txt);
  padding:10px 14px;border-radius:12px;font-weight:600;font-size:14px;transition:.12s}
.btn:hover{transform:translateY(-1px);border-color:var(--acc)}
.btn:active{transform:translateY(0)}
.btn.primary{background:linear-gradient(135deg,var(--acc),#3a6bff);border-color:transparent;color:#fff}
.btn.green{background:linear-gradient(135deg,#16a34a,#22c55e);border-color:transparent;color:#fff}
.btn.red{background:linear-gradient(135deg,#dc2626,#ef4444);border-color:transparent;color:#fff}
.btn.purple{background:linear-gradient(135deg,#9333ea,#a855f7);border-color:transparent;color:#fff}
.btn.gold{background:linear-gradient(135deg,#d97706,#fbbf24);border-color:transparent;color:#1a1300}
.btn.blue{background:linear-gradient(135deg,#2563eb,#3b82f6);border-color:transparent;color:#fff}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:12.5px;border-radius:10px}
.btn.block{width:100%;justify-content:center;text-align:center}
.btn-money{padding:8px 0;border-radius:10px;font-weight:700;font-size:13px;border:1px solid var(--line);
  background:var(--panel2);color:var(--txt)}
.btn-money.plus{color:#bbf7d0;border-color:#1f6f43}
.btn-money.plus:hover{background:#11331f}
.btn-money.minus{color:#fecaca;border-color:#7f2b2b}
.btn-money.minus:hover{background:#3a1414}

/* Inputs */
input,select,textarea{font-family:inherit;font-size:14px;color:var(--txt);background:var(--bg2);
  border:1px solid var(--line);border-radius:10px;padding:9px 11px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
textarea{resize:vertical;min-height:60px}
label.fl{display:block;font-size:12px;color:var(--muted);margin:0 0 4px}
.field{margin-bottom:10px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:999px;border:1px solid transparent}
.b-green{background:rgba(34,197,94,.15);color:#86efac;border-color:rgba(34,197,94,.35)}
.b-red{background:rgba(239,68,68,.15);color:#fca5a5;border-color:rgba(239,68,68,.35)}
.b-orange{background:rgba(245,158,11,.15);color:#fcd34d;border-color:rgba(245,158,11,.35)}
.b-purple{background:rgba(168,85,247,.15);color:#d8b4fe;border-color:rgba(168,85,247,.35)}
.b-blue{background:rgba(59,130,246,.15);color:#93c5fd;border-color:rgba(59,130,246,.35)}
.b-gold{background:rgba(251,191,36,.15);color:#fde68a;border-color:rgba(251,191,36,.4)}
.b-gray{background:rgba(100,116,139,.18);color:#cbd5e1;border-color:rgba(100,116,139,.4)}
.b-teal{background:rgba(20,184,166,.15);color:#5eead4;border-color:rgba(20,184,166,.35)}

/* Player cards */
.player{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:10px}
.player.neg{border-color:var(--red);box-shadow:0 0 0 1px rgba(239,68,68,.25) inset}
.player .pname{font-weight:800;font-size:16px}
.player .pbal{font-weight:800;font-size:18px;font-variant-numeric:tabular-nums}
.team-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px}
.tag-chip{font-size:10.5px;padding:2px 7px;border-radius:999px;background:var(--bg2);
  border:1px solid var(--line);color:var(--muted);cursor:pointer}
.tag-chip.on{background:rgba(91,140,255,.2);border-color:var(--acc);color:#cdd9ff}
.flash-up{animation:flashUp .8s}
.flash-down{animation:flashDown .8s}
@keyframes flashUp{0%{background:rgba(34,197,94,.4)}100%{background:var(--panel2)}}
@keyframes flashDown{0%{background:rgba(239,68,68,.4)}100%{background:var(--panel2)}}

/* Event card */
.event-card{border-radius:16px;padding:16px;border:1px solid var(--line);background:var(--panel2);position:relative;overflow:hidden}
.event-card.appear{animation:cardIn .45s cubic-bezier(.2,.8,.2,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.event-card .etitle{font-size:18px;font-weight:800;margin:8px 0}
.edge{height:5px;border-radius:5px;width:60px;margin-bottom:4px}
.shuffling{text-align:center;padding:30px;font-size:15px;color:var(--muted);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.choice{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px;margin-top:8px}
.choice:hover{border-color:var(--acc)}

/* Economy bars */
.econ-row{margin-bottom:9px}
.econ-row .lbl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px}
.bar{height:8px;border-radius:6px;background:var(--bg2);overflow:hidden}
.bar > span{display:block;height:100%;border-radius:6px;transition:width .5s}

/* Risk meter */
.risk-meter{height:14px;border-radius:8px;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);position:relative;overflow:hidden}
.risk-meter .knob{position:absolute;top:-3px;width:4px;height:20px;background:#fff;border-radius:3px;box-shadow:0 0 6px #000;transition:left .6s}

/* History */
.hitem{border-left:3px solid var(--line);padding:8px 10px;margin-bottom:7px;background:var(--bg2);border-radius:0 10px 10px 0}
.hitem .ht{font-weight:700;font-size:13.5px}
.hitem .hm{font-size:11.5px;color:var(--muted)}

/* Modal / toast */
.overlay{position:fixed;inset:0;background:rgba(4,8,20,.7);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px;
  max-width:520px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow)}
.toast-wrap{position:fixed;left:0;right:0;bottom:18px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none}
.toast{background:var(--panel);border:1px solid var(--acc);color:var(--txt);padding:11px 16px;
  border-radius:12px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);animation:cardIn .3s}
.toast.ach{border-color:var(--gold);background:linear-gradient(135deg,#2a2200,#141d3a)}

/* Achievements */
.ach-card{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px;opacity:.45}
.ach-card.open{opacity:1;border-color:var(--gold)}
.ach-card .ai{font-size:24px}

/* tag filter pills in mass op */
.pickbox{max-height:160px;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:8px;background:var(--bg2)}
.pick{display:flex;align-items:center;gap:8px;padding:4px 0}

.section-title{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:4px 0 8px}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0}
.scroll-x{overflow-x:auto}
.warn-box{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fecaca;padding:10px;border-radius:10px;font-size:13px}
.ok-box{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.35);color:#bbf7d0;padding:10px;border-radius:10px;font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="app-head">
    <div style="font-size:30px">💸</div>
    <div class="brand">
      <div class="title">CashFlow Events</div>
      <div class="sub">Экономический симулятор и калькулятор игроков для CashFlow</div>
      <div class="badge-unofficial">Неофициальный фанатский модуль для финансовых настольных игр в стиле CashFlow</div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="view"></div>
</div>

<div id="modalRoot"></div>
<div class="toast-wrap" id="toasts"></div>

<script>
/* ============================================================
   CashFlow Events — single-file app
   Разделы кода:
   1) DATA  — события, челленджи, возможности, тренды, достижения, теги
   2) STATE — состояние партии + localStorage
   3) HELPERS — деньги, история, рандом
   4) PLAYERS / TEAMS — калькулятор
   5) MONEY OPS — начисление/списание/перевод/массовые
   6) EVENTS — генератор + применение к балансам
   7) ECONOMY — кубик, индекс риска, тренд, показатели
   8) RENDER — вкладки и интерфейс
   ============================================================ */
/* ---------- 1) DATA ---------- */

// Категории, типы, редкость — справочники
const CATEGORIES = ["Глобальная экономика","Недвижимость","Акции и инвестиции","Бизнес и предпринимательство","Личные события","Банки, кредиты и долги","Налоги и государство","Технологии и инновации","Потребительский рынок","Чёрные лебеди и кризисы","Возможности","Социальные тренды","Командные события","Денежные события","Переговоры и сделки"];

const PLAYER_TAGS = ["есть недвижимость","есть бизнес","есть акции","есть кредиты","есть дети","отрицательный cashflow","высокий пассивный доход","много наличных","рискованный инвестор","консервативный инвестор","лидер","новичок","предприниматель","инвестор","должник"];

// Цвет/бейдж по типу события
const TYPE_META = {
  positive:{badge:"b-green",edge:"var(--green)",label:"Позитивное"},
  negative:{badge:"b-red",edge:"var(--red)",label:"Негативное"},
  mixed:{badge:"b-orange",edge:"var(--orange)",label:"Смешанное"},
  crisis:{badge:"b-purple",edge:"var(--purple)",label:"Кризис"},
  opportunity:{badge:"b-blue",edge:"var(--blue)",label:"Возможность"},
  decision:{badge:"b-teal",edge:"var(--teal)",label:"Решение"}
};
const RARITY_META = {
  common:{w:45,label:"Обычное",badge:"b-gray"},
  uncommon:{w:25,label:"Необычное",badge:"b-green"},
  rare:{w:15,label:"Редкое",badge:"b-blue"},
  epic:{w:10,label:"Эпическое",badge:"b-purple"},
  legendary:{w:5,label:"Легендарное",badge:"b-gold"}
};

// Фабрика событий с дефолтами
let _eid = 0;
function E(o){
  _eid++;
  return Object.assign({
    id:"E"+String(_eid).padStart(3,"0"),
    title:"", category:"Глобальная экономика", type:"negative",
    rarity:"common", impactLevel:"medium", description:"", appliesTo:"Все игроки",
    effect:"", duration:"1 раунд", discussionQuestion:"",
    economyImpact:{}, targetRule:"all",
    moneyEffectType:"none", moneyAmount:0, moneyPercent:0, autoApplicable:false,
    choices:null
  }, o);
}

const EVENTS = [];
function addEvents(list){ list.forEach(e=>EVENTS.push(e)); }

/* --- Категория 1: Глобальная экономика --- */
addEvents([
E({title:"Глобальный экономический рост",category:"Глобальная экономика",type:"positive",rarity:"common",impactLevel:"medium",description:"Мировая экономика ускоряется, растут зарплаты и потребление.",effect:"Все игроки получают +3% к наличным от роста доходов.",targetRule:"all",moneyEffectType:"percentAdd",moneyPercent:3,autoApplicable:true,economyImpact:{business:6,sentiment:8,risk:-5},discussionQuestion:"Куда вложить дополнительный доход, чтобы он работал?"}),
E({title:"Скачок инфляции",category:"Глобальная экономика",type:"negative",rarity:"common",impactLevel:"medium",description:"Цены растут быстрее доходов, наличные обесцениваются.",effect:"Все теряют 5% наличных из-за инфляции.",targetRule:"all",moneyEffectType:"percentSubtract",moneyPercent:5,autoApplicable:true,economyImpact:{inflation:8,risk:6,sentiment:-5}}),
E({title:"Снижение ключевой ставки",category:"Глобальная экономика",type:"positive",rarity:"uncommon",impactLevel:"medium",description:"Центробанк удешевляет деньги, кредиты дешевеют.",effect:"Игроки с кредитами экономят на процентах: +400$.",appliesTo:"Игроки с тегом «есть кредиты»",targetRule:"tag:есть кредиты",moneyEffectType:"add",moneyAmount:400,autoApplicable:true,economyImpact:{rate:-8,business:5,risk:-4}}),
E({title:"Рост ключевой ставки",category:"Глобальная экономика",type:"negative",rarity:"uncommon",impactLevel:"high",description:"Деньги дорожают, обслуживание долга растёт.",effect:"Игроки с кредитами платят 600$ дополнительных процентов.",appliesTo:"Игроки с тегом «есть кредиты»",targetRule:"tag:есть кредиты",moneyEffectType:"subtract",moneyAmount:600,autoApplicable:true,economyImpact:{rate:9,risk:8,business:-5}}),
E({title:"Восстановление мировой торговли",category:"Глобальная экономика",type:"positive",rarity:"uncommon",impactLevel:"medium",description:"Логистика налаживается, экспортные доходы растут.",effect:"Предприниматели получают +1 200$.",appliesTo:"Игроки с тегом «предприниматель»",targetRule:"tag:предприниматель",moneyEffectType:"add",moneyAmount:1200,autoApplicable:true,economyImpact:{business:7,sentiment:5,risk:-3}}),
E({title:"Замедление мировой экономики",category:"Глобальная экономика",type:"negative",rarity:"common",impactLevel:"medium",description:"Спрос падает, бизнесы режут расходы.",effect:"Все теряют 4% наличных.",targetRule:"all",moneyEffectType:"percentSubtract",moneyPercent:4,autoApplicable:true,economyImpact:{business:-7,sentiment:-6,risk:5}}),
E({title:"Валютная нестабильность",category:"Глобальная экономика",type:"mixed",rarity:"rare",impactLevel:"high",description:"Курс скачет: одни выигрывают на разнице, другие теряют.",effect:"Рискованные инвесторы +2%, консервативные -2% наличных (по решению ведущего).",appliesTo:"Зависит от стратегии игрока",targetRule:"all",moneyEffectType:"custom",autoApplicable:false,economyImpact:{inflation:4,risk:7,sentiment:-3},discussionQuestion:"Стоит ли держать часть капитала в разных активах?"}),
E({title:"Сырьевой суперцикл",category:"Глобальная экономика",type:"positive",rarity:"rare",impactLevel:"high",description:"Цены на ресурсы взлетают, владельцы активов в плюсе.",effect:"Игроки с недвижимостью или бизнесом получают +1 500$.",appliesTo:"Игроки с активами",targetRule:"tag:есть бизнес",moneyEffectType:"add",moneyAmount:1500,autoApplicable:true,economyImpact:{business:8,inflation:5,risk:3}}),
E({title:"Дефляционный шок",category:"Глобальная экономика",type:"negative",rarity:"rare",impactLevel:"high",description:"Цены падают, но падают и доходы, бизнес замирает.",effect:"Предприниматели теряют 8% наличных.",appliesTo:"Игроки с тегом «предприниматель»",targetRule:"tag:предприниматель",moneyEffectType:"percentSubtract",moneyPercent:8,autoApplicable:true,economyImpact:{inflation:-10,business:-8,risk:7}}),
E({title:"Глобальный пакет стимулов",category:"Глобальная экономика",type:"positive",rarity:"epic",impactLevel:"high",description:"Правительства заливают экономику деньгами.",effect:"Все игроки получают +1 000$.",targetRule:"all",moneyEffectType:"add",moneyAmount:1000,autoApplicable:true,economyImpact:{business:6,inflation:6,risk:-6,sentiment:9}})
]);

/* --- Категория 2: Недвижимость --- */
addEvents([
E({title:"Бум на рынке недвижимости",category:"Недвижимость",type:"positive",rarity:"common",impactLevel:"medium",description:"Цены на жильё растут, арендодатели богатеют.",effect:"Игроки с недвижимостью получают +1 000$.",appliesTo:"Игроки с тегом «есть недвижимость»",targetRule:"tag:есть недвижимость",moneyEffectType:"add",moneyAmount:1000,autoApplicable:true,economyImpact:{realEstate:9,sentiment:5,risk:3}}),
E({title:"Падение цен на жильё",category:"Недвижимость",type:"negative",rarity:"common",impactLevel:"medium",description:"Рынок недвижимости корректируется вниз.",effect:"Игроки с недвижимостью теряют 6% наличных.",appliesTo:"Игроки с тегом «есть недвижимость»",targetRule:"tag:есть недвижимость",moneyEffectType:"percentSubtract",moneyPercent:6,autoApplicable:true,economyImpact:{realEstate:-9,risk:6,sentiment:-5}}),
E({title:"Рост арендных ставок",category:"Недвижимость",type:"positive",rarity:"uncommon",impactLevel:"medium",description:"Аренда дорожает, пассивный доход растёт.",effect:"Игроки с недвижимостью получают +700$ дохода от аренды.",appliesTo:"Игроки с тегом «есть недвижимость»",targetRule:"tag:есть недвижимость",moneyEffectType:"add",moneyAmount:700,autoApplicable:true,economyImpact:{realEstate:6,inflation:3}}),

/* ---------- 2) STATE + localStorage ---------- */
const LS_KEY = "cashflow_events_v1";

function defaultEconomy(){
  return {inflation:35, rate:30, realEstate:55, stocks:55, unemployment:40, business:55, sentiment:55};
}
function defaultState(){
  return {
    round:1, mode:"basic", trendId:"growth", riskIndex:35,
    economy:defaultEconomy(),
    players:[], teams:[], moneyHistory:[], gameHistory:[],
    achievements:[], lastEventIds:[],
    counters:{events:0, crises:0, opportunities:0, decisions:0, moneyOps:0, dice:0},
    activeTab:"panel", uid:1
  };
}
let state = load() || defaultState();

function load(){
  try{ const r = localStorage.getItem(LS_KEY); return r? JSON.parse(r): null; }catch(e){ return null; }
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){ toast("Не удалось сохранить (localStorage)"); }
}
function nextId(){ return state.uid++; }

/* ---------- 3) HELPERS ---------- */
function fmt(n){ // денежный формат
  n = Math.round(n);
  const sign = n<0?"-":"";
  return sign + "$" + Math.abs(n).toLocaleString("ru-RU");
}
function nowStr(){
  const d = new Date();
  return d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function byId(arr,id){ return arr.find(x=>x.id===id); }

function currentTrend(){ return byId(TRENDS, state.trendId) || TRENDS[0]; }
function currentMode(){ return MODES.find(m=>m.id===state.mode) || MODES[0]; }

// Toast-уведомления
function toast(msg, cls){
  const wrap = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast"+(cls?" "+cls:"");
  el.innerHTML = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.transition="opacity .4s"; el.style.opacity="0"; setTimeout(()=>el.remove(),400); }, 2600);
}

// Модальное окно. buttons: [{label,cls,onClick(close)}]
function modal(title, bodyHTML, buttons){
  const root = document.getElementById("modalRoot");
  const ov = document.createElement("div");
  ov.className="overlay";
  const btns = (buttons||[{label:"Закрыть",cls:"btn"}]);
  ov.innerHTML = '<div class="modal"><h2>'+esc(title)+'</h2><div id="mbody">'+bodyHTML+'</div>'+
    '<div class="row" style="margin-top:14px;justify-content:flex-end"></div></div>';
  const close = ()=>ov.remove();
  ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
  const brow = ov.querySelector(".row");
  btns.forEach(b=>{
    const bb=document.createElement("button");
    bb.className="btn "+(b.cls||"");
    bb.textContent=b.label;
    bb.onclick=()=>{ if(b.onClick) b.onClick(close, ov); else close(); };
    brow.appendChild(bb);
  });
  root.appendChild(ov);
  return ov;
}
function confirmModal(title, text, onYes, yesLabel, yesCls){
  modal(title, '<p>'+esc(text)+'</p>', [
    {label:"Отмена",cls:"ghost"},
    {label:yesLabel||"Подтвердить",cls:yesCls||"red",onClick:(close)=>{ close(); onYes(); }}
  ]);
}

/* ---------- История партии и операций ---------- */
function logGame(type, title, desc, players, teams){
  state.gameHistory.unshift({
    n: state.gameHistory.length+1, round: state.round, type:type,
    title:title, desc:desc||"", time:nowStr(),
    players:players||[], teams:teams||[]
  });
  if(state.gameHistory.length>400) state.gameHistory.pop();
}
function logMoney(op){
  op.id = "M"+nextId();
  op.round = state.round;
  op.timestamp = nowStr();
  state.moneyHistory.unshift(op);
  state.counters.moneyOps++;
  if(state.moneyHistory.length>600) state.moneyHistory.pop();
  checkAchievements();
}

/* ---------- Достижения ---------- */
function unlock(id){
  if(state.achievements.includes(id)) return;
  const a = ACHIEVEMENTS.find(x=>x.id===id); if(!a) return;
  state.achievements.push(id);
  logGame("achievement","Достижение: "+a.title, a.desc);
  toast(a.icon+" Достижение: <b>"+esc(a.title)+"</b>", "ach");
}
function checkAchievements(){
  const c = state.counters;
  if(c.crises>=1) unlock("first_crisis");
  if(c.crises>=3) unlock("storm");
  if(state.riskIndex>=80) unlock("hot_economy");
  if(state.riskIndex<20) unlock("calm");
  if(c.opportunities>=5) unlock("opp_hunter");
  if(c.decisions>=5) unlock("decisions");
  if(c.events>=20) unlock("econ_storm");
  if(c.dice>=5) unlock("dice_master");
  if(state.players.length>=1) unlock("first_player");
  if(state.teams.length>=1) unlock("first_team");
  if(c.moneyOps>=20) unlock("banker");
  if(totalCapital()>=100000) unlock("big_capital");
}

/* ---------- Экономика: применение влияния ---------- */
function applyEconomy(delta){
  if(!delta) return;
  const e = state.economy;
  for(const k in delta){
    if(k==="risk"){ state.riskIndex = clamp(state.riskIndex + delta.risk, 0, 100); continue; }
    if(e[k]!=null) e[k] = clamp(e[k] + delta[k], 0, 100);
  }
  checkAchievements();
}

function totalCapital(){ return state.players.reduce((s,p)=>s+p.cash,0); }
/* ---------- 4) PLAYERS / TEAMS ---------- */
function addPlayer(name, cash, teamId){
  name = (name||"").trim();
  if(!name){ toast("⚠️ Введите имя игрока"); return false; }
  const p = {
    id:"P"+nextId(), name:name, teamId:teamId||null,
    cash: isFinite(cash)?cash:0, notes:"", tags:[], isActive:true,
    createdAt:nowStr(), updatedAt:nowStr()
  };
  state.players.push(p);
  logGame("player","Добавлен игрок: "+name, "Стартовый баланс "+fmt(p.cash), [p.id]);
  checkAchievements(); save(); render();
  return true;
}
function deletePlayer(id){
  const p = byId(state.players,id); if(!p) return;
  state.players = state.players.filter(x=>x.id!==id);
  logGame("player","Удалён игрок: "+p.name, "Баланс на момент удаления "+fmt(p.cash));
  save(); render();
}
function updatePlayer(id, fields){
  const p = byId(state.players,id); if(!p) return;
  const changes=[];
  if(fields.name!=null && fields.name.trim() && fields.name!==p.name){ changes.push("имя: "+p.name+" → "+fields.name); p.name=fields.name.trim(); }
  if(fields.cash!=null && isFinite(fields.cash) && fields.cash!==p.cash){
    logBalanceChange(p, fields.cash, "Ручная корректировка баланса", "setBalance");
    changes.push("баланс → "+fmt(fields.cash));
  }
  if(fields.teamId!==undefined && fields.teamId!==p.teamId){
    p.teamId = fields.teamId||null; changes.push("команда изменена");
  }
  if(fields.tags!=null){ p.tags = fields.tags; }
  if(fields.notes!=null){ p.notes = fields.notes; }
  p.updatedAt = nowStr();
  if(changes.length) logGame("player","Изменён игрок: "+p.name, changes.join("; "), [p.id]);
  save(); render();
}
function toggleTag(id, tag){
  const p = byId(state.players,id); if(!p) return;
  if(p.tags.includes(tag)) p.tags = p.tags.filter(t=>t!==tag);
  else p.tags.push(tag);
  p.updatedAt=nowStr(); save(); render();
}

// Команды
function addTeam(name, color){
  name=(name||"").trim(); if(!name){ toast("⚠️ Введите название команды"); return; }
  const t={id:"T"+nextId(), name:name, color:color||"#14b8a6", notes:"", createdAt:nowStr()};
  state.teams.push(t);
  logGame("team","Создана команда: "+name, "", [], [t.id]);
  checkAchievements(); save(); render();
}
function deleteTeam(id){
  const t=byId(state.teams,id); if(!t) return;
  state.players.forEach(p=>{ if(p.teamId===id) p.teamId=null; });
  state.teams = state.teams.filter(x=>x.id!==id);
  logGame("team","Удалена команда: "+t.name, "Игроки стали «без команды»");
  save(); render();
}
function updateTeam(id, fields){
  const t=byId(state.teams,id); if(!t) return;
  if(fields.name!=null && fields.name.trim()) t.name=fields.name.trim();
  if(fields.color!=null) t.color=fields.color;
  if(fields.notes!=null) t.notes=fields.notes;
  logGame("team","Изменена команда: "+t.name);
  save(); render();
}
function teamMembers(id){ return state.players.filter(p=>p.teamId===id); }
function teamName(id){ const t=byId(state.teams,id); return t?t.name:"Без команды"; }
function teamColor(id){ const t=byId(state.teams,id); return t?t.color:"#64748b"; }

/* ---------- 5) MONEY OPERATIONS ---------- */
// Базовое изменение баланса с записью в историю
function logBalanceChange(p, newCash, reason, type, extra){
  const before = p.cash;
  p.cash = Math.round(newCash);
  p.updatedAt = nowStr();
  const op = Object.assign({
    type:type, targetType:"player", targetName:p.name, playerId:p.id,
    amount: Math.round(p.cash-before), percent:0, fromPlayer:null, toPlayer:null,
    reason:reason||"", balanceBefore:before, balanceAfter:p.cash, relatedEventId:null
  }, extra||{});
  logMoney(op);
  flashPlayer(p.id, p.cash>=before);
  if(p.cash<0) toast("⚠️ У игрока «"+esc(p.name)+"» отрицательный баланс");
}
function flashPlayer(id, up){
  setTimeout(()=>{
    const el = document.querySelector('[data-pcard="'+id+'"]');
    if(el){ el.classList.remove("flash-up","flash-down"); void el.offsetWidth;
      el.classList.add(up?"flash-up":"flash-down"); }

}

// Начислить / списать одному игроку
function changeMoney(playerId, amount, reason, isIncome){
  const p = byId(state.players,playerId); if(!p) return;
  const delta = isIncome? Math.abs(amount): -Math.abs(amount);
  logBalanceChange(p, p.cash+delta, reason||(isIncome?"Начисление":"Списание"), isIncome?"income":"expense");
  save(); render();
}

// Перевод между игроками
function transfer(fromId, toId, amount, comment){
  if(fromId===toId){ toast("⚠️ Нельзя перевести самому себе"); return; }
  const a=byId(state.players,fromId), b=byId(state.players,toId);
  if(!a||!b){ toast("⚠️ Выберите игроков"); return; }
  amount=Math.abs(amount); if(!amount){ toast("⚠️ Укажите сумму"); return; }
  const r = comment||"Перевод между игроками";
  // отправитель
  const beforeA=a.cash; a.cash-=amount; a.updatedAt=nowStr();
  logMoney({type:"transfer",targetType:"player",targetName:a.name,playerId:a.id,amount:-amount,percent:0,
    fromPlayer:a.name,toPlayer:b.name,reason:r,balanceBefore:beforeA,balanceAfter:a.cash,relatedEventId:null});
  // получатель
  const beforeB=b.cash; b.cash+=amount; b.updatedAt=nowStr();
  logMoney({type:"transfer",targetType:"player",targetName:b.name,playerId:b.id,amount:amount,percent:0,
    fromPlayer:a.name,toPlayer:b.name,reason:r,balanceBefore:beforeB,balanceAfter:b.cash,relatedEventId:null});
  logGame("money","Перевод: "+a.name+" → "+b.name, fmt(amount)+" — "+r, [a.id,b.id]);
  flashPlayer(a.id,false); flashPlayer(b.id,true);
  if(a.cash<0) toast("⚠️ У «"+esc(a.name)+"» отрицательный баланс");
  save(); render();
}

// Применить денежный эффект к набору игроков (используется массовыми операциями и событиями)
// effect: {moneyEffectType, moneyAmount, moneyPercent}
function applyMoneyEffect(players, effect, reason, eventId){
  players.forEach(p=>{
    let nb = p.cash, amt=0, pct=0;
    switch(effect.moneyEffectType){
      case "add": nb = p.cash + effect.moneyAmount; amt=effect.moneyAmount; break;
      case "subtract": nb = p.cash - effect.moneyAmount; amt=-effect.moneyAmount; break;
      case "percentAdd": amt=Math.round(p.cash*effect.moneyPercent/100); nb=p.cash+amt; pct=effect.moneyPercent; break;
      case "percentSubtract": amt=-Math.round(p.cash*effect.moneyPercent/100); nb=p.cash+amt; pct=effect.moneyPercent; break;
      case "set": amt=effect.moneyAmount-p.cash; nb=effect.moneyAmount; break;
      case "multiply": nb=Math.round(p.cash*effect.factor); amt=nb-p.cash; break;
      default: return;
    }
    const before=p.cash; p.cash=Math.round(nb); p.updatedAt=nowStr();
    logMoney({type: eventId?"eventEffect":(effect.opType||"income"), targetType:"player", targetName:p.name, playerId:p.id,
      amount:Math.round(amt), percent:pct, fromPlayer:null, toPlayer:null,
      reason:reason, balanceBefore:before, balanceAfter:p.cash, relatedEventId:eventId||null});
    flashPlayer(p.id, p.cash>=before);
    if(p.cash<0) toast("⚠️ У «"+esc(p.name)+"» отрицательный баланс");
  });
}

// Кто подходит под правило применения targetRule
function resolveTargets(rule, opts){
  opts=opts||{};
  if(rule==="all") return state.players.slice();
  if(rule==="player") return opts.playerId? [byId(state.players,opts.playerId)].filter(Boolean): [];
  if(rule==="team") return opts.teamId? teamMembers(opts.teamId): [];
  if(rule && rule.indexOf("tag:")===0){
    const tag = rule.slice(4);
    return state.players.filter(p=>p.tags.includes(tag));
  }
  if(rule==="selected") return (opts.ids||[]).map(id=>byId(state.players,id)).filter(Boolean);
  return [];
}

// Массовая операция
function massOperation(targets, op){
  if(!targets.length){ toast("⚠️ Нет подходящих игроков"); return; }
  const reason = op.reason||"Массовая операция";
  let eff;
  if(op.kind==="add") eff={moneyEffectType:"add",moneyAmount:op.amount,opType:"income"};
  else if(op.kind==="subtract") eff={moneyEffectType:"subtract",moneyAmount:op.amount,opType:"expense"};
  else if(op.kind==="set") eff={moneyEffectType:"set",moneyAmount:op.amount,opType:"setBalance"};
  else if(op.kind==="multiply") eff={moneyEffectType:"multiply",factor:op.factor,opType:"percentChange"};
  else if(op.kind==="percentAdd") eff={moneyEffectType:"percentAdd",moneyPercent:op.percent,opType:"percentChange"};
  else if(op.kind==="percentSubtract") eff={moneyEffectType:"percentSubtract",moneyPercent:op.percent,opType:"percentChange"};
  applyMoneyEffect(targets, eff, reason);
  logGame("money","Массовая операция", reason+" — затронуто игроков: "+targets.length, targets.map(t=>t.id));
  save(); render();
}
/* ---------- 6) EVENTS — генератор ---------- */
let lastEvent = null;          // последнее показанное событие
let categoryFilter = "all";    // фильтр категории в генераторе

// Вес события с учётом редкости, режима, тренда, индекса риска
function eventWeight(ev){
  let w = RARITY_META[ev.rarity].w;       // базовый вес по редкости
  const mode = state.mode, trend = currentTrend();
  // Режимы игры
  if(mode==="crisis"){ if(ev.type==="crisis"||ev.type==="negative") w*=2.4; }
  if(mode==="opportunity"){ if(ev.type==="opportunity"||ev.type==="positive"||ev.type==="decision") w*=2.2; }
  if(mode==="chaos"){ w*= (0.5 + Math.random()*1.8); }
  if(mode==="team"){ if(ev.category==="Командные события") w*=3.2; }
  if(mode==="money"){ if(ev.autoApplicable) w*=2.2; }
  if(mode==="realistic"){
    // зависимость от показателей экономики
    if(ev.type==="crisis") w *= 1 + state.riskIndex/60;
    if(ev.category==="Недвижимость") w *= state.economy.realEstate/55;
    if(ev.category==="Акции и инвестиции") w *= state.economy.stocks/55;
    if(ev.category==="Бизнес и предпринимательство") w *= state.economy.business/55;
  }
  // Индекс риска повышает кризисы всегда
  if(ev.type==="crisis") w *= 1 + Math.max(0,(state.riskIndex-50))/50;
  if(ev.type==="opportunity"||ev.type==="positive") w *= 1 + Math.max(0,(50-state.riskIndex))/80;
  // Глобальный тренд
  if(trend.favor.includes(ev.category)) w *= (1+trend.boost);
  return Math.max(0.1, w);
}

function drawEvent(){
  let pool = EVENTS.filter(e=> categoryFilter==="all" || e.category===categoryFilter);
  // не повторять последнее
  if(lastEvent && pool.length>1) pool = pool.filter(e=>e.id!==lastEvent.id);
  // не повторять из недавних (последние 2)
  if(pool.length>3) pool = pool.filter(e=> state.lastEventIds.slice(0,2).indexOf(e.id)<0);
  if(!pool.length) pool = EVENTS.slice();
  // взвешенный выбор
  const weights = pool.map(eventWeight);
  const sum = weights.reduce((a,b)=>a+b,0);
  let r = Math.random()*sum, idx=0;
  for(let i=0;i<pool.length;i++){ r-=weights[i]; if(r<=0){ idx=i; break; } }
  const ev = pool[idx];
  lastEvent = ev;
  state.lastEventIds.unshift(ev.id);
  if(state.lastEventIds.length>10) state.lastEventIds.pop();
  // счётчики и эффект на экономику
  state.counters.events++;
  if(ev.type==="crisis") state.counters.crises++;
  if(ev.type==="opportunity") state.counters.opportunities++;
  applyEconomy(ev.economyImpact);
  logGame("event", ev.title, ev.category+" • "+TYPE_META[ev.type].label);
  checkAchievements(); save();
  renderEventCard(ev, "event");
}

// Подобрать подходящих игроков к событию (по targetRule)
function suitablePlayers(ev){
  if(ev.targetRule && ev.targetRule.indexOf("tag:")===0){
    const tag = ev.targetRule.slice(4);
    return state.players.filter(p=>p.tags.includes(tag));
  }
  if(ev.targetRule==="all") return state.players.slice();
  return [];
}

// Предпросмотр денежного эффекта
function previewEffect(targets, ev){
  return targets.map(p=>{
    let after=p.cash;
    switch(ev.moneyEffectType){
      case "add": after=p.cash+ev.moneyAmount; break;
      case "subtract": after=p.cash-ev.moneyAmount; break;
      case "percentAdd": after=p.cash+Math.round(p.cash*ev.moneyPercent/100); break;
      case "percentSubtract": after=p.cash-Math.round(p.cash*ev.moneyPercent/100); break;
      case "set": after=ev.moneyAmount; break;
    }
    return {p, before:p.cash, after:Math.round(after)};
  });
}

// Применить событие к набору игроков c предпросмотром
function applyEventTo(ev, targets){
  if(!targets.length){ toast("⚠️ Нет подходящих игроков"); return; }
  if(ev.moneyEffectType==="none"||ev.moneyEffectType==="custom"){
    toast("ℹ️ У события нет авто-эффекта — примените вручную");
    return;
  }
  const prev = previewEffect(targets, ev);
  const rows = prev.map(x=>'<div class="row spread" style="border-bottom:1px solid var(--line);padding:5px 0">'
     +'<span>'+esc(x.p.name)+'</span><span><span class="muted">'+fmt(x.before)+'</span> → <b style="color:'+(x.after>=x.before?'var(--green)':'var(--red)')+'">'+fmt(x.after)+'</b></span></div>').join("");
  const totalDelta = prev.reduce((s,x)=>s+(x.after-x.before),0);
  modal("Предпросмотр эффекта: "+ev.title,
    '<p class="small muted">'+esc(ev.effect)+'</p>'+rows+
    '<div class="row spread" style="margin-top:8px"><b>Общий эффект</b><b style="color:'+(totalDelta>=0?'var(--green)':'var(--red)')+'">'+fmt(totalDelta)+'</b></div>',
    [{label:"Отмена",cls:"ghost"},
     {label:"Применить",cls:"primary",onClick:(close)=>{
        applyMoneyEffect(targets, ev, "Эффект события: "+ev.title, ev.id);
        logGame("event","Применён эффект: "+ev.title, "Игроков: "+targets.length, targets.map(t=>t.id));
        save(); render(); close();
        toast("✅ Эффект применён");
     }}]);
}

// Применить выбор интерактивного события
function applyChoice(ev, choice, opts){
  state.counters.decisions++;
  applyEconomy(choice.economyImpact);
  // risk-or-safety мини-игра
  if(choice.outcomes){
    const r=Math.random()*100; let acc=0, out=choice.outcomes[choice.outcomes.length-1];
    for(const o of choice.outcomes){ acc+=o.chance; if(r<=acc){ out=o; break; } }
    finishChoice(ev, choice, out, opts, out.label);
  } else {
    finishChoice(ev, choice, choice, opts, null);
  }
}
function finishChoice(ev, choice, effect, opts, outcomeLabel){
  const rule = effect.targetRule || choice.targetRule || "player";
  const targets = resolveTargets(rule, opts);
  let msg = "Выбор: "+choice.text;
  if(outcomeLabel) msg += " → "+outcomeLabel;
  if(effect.moneyEffectType && effect.moneyEffectType!=="none" && targets.length){
    applyMoneyEffect(targets, effect, "Решение: "+ev.title, ev.id);
  }
  logGame("decision", ev.title, msg, targets.map(t=>t.id));
  checkAchievements(); save(); render();
  toast("🧠 "+esc(outcomeLabel||choice.text));
}

function copyText(t){
  if(navigator.clipboard){ navigator.clipboard.writeText(t).catch(()=>{}); }
  else { const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} ta.remove(); }
}

function playerCard(p){

  const recent = state.moneyHistory.filter(m=>m.playerId===p.id).slice(0,3)
    .map(m=>'<div class="small muted">'+(m.amount>=0?'＋':'')+fmt(m.amount).replace('$','$')+' — '+esc(m.reason)+'</div>').join("") || '<div class="small muted">операций нет</div>';

function teamCard(t){
  const mem = teamMembers(t.id);
  const total = mem.reduce((s,p)=>s+p.cash,0);
  const avg = mem.length? Math.round(total/mem.length): 0;
  let rich="—", poor="—";
  if(mem.length){
    const sorted=[...mem].sort((a,b)=>b.cash-a.cash);
    rich = sorted[0].name+" ("+fmt(sorted[0].cash)+")";
    poor = sorted[sorted.length-1].name+" ("+fmt(sorted[sorted.length-1].cash)+")";
  }
  const memList = mem.map(p=>'<span class="tag-chip on">'+esc(p.name)+' '+fmt(p.cash)+'</span>').join(" ")||'<span class="muted small">нет участников</span>';
  return '<div class="player" style="border-left:4px solid '+t.color+'">'+
    '<div class="row spread"><div class="pname"><span class="team-dot" style="background:'+t.color+'"></span>'+esc(t.name)+'</div>'+
      '<div class="pbal">'+fmt(total)+'</div></div>'+
    '<div class="grid g3 keep" style="margin-top:8px">'+
      stat("Участников", mem.length)+ stat("Средний баланс", fmt(avg))+ stat("Всего", fmt(total))+
    '</div>'+
    '<div class="small" style="margin-top:8px"><b>Лидер:</b> '+esc(rich)+' &nbsp; <b>Аутсайдер:</b> '+esc(poor)+'</div>'+
    '<div style="margin-top:8px">'+memList+'</div>'+
    '<div class="row" style="margin-top:10px">'+
      '<button class="btn sm green" data-act="teamAdd" data-id="'+t.id+'">＋ Начислить команде</button>'+
      '<button class="btn sm red" data-act="teamSub" data-id="'+t.id+'">－ Списать у команды</button>'+
      '<button class="btn sm" data-act="teamAssign" data-id="'+t.id+'">👥 Состав</button>'+
      '<button class="btn sm" data-act="teamEdit" data-id="'+t.id+'">✏️ Изменить</button>'+
      '<button class="btn sm red" data-act="teamDel" data-id="'+t.id+'">🗑️ Удалить</button>'+
    '</div>'+
  '</div>';
}

// Рендер карточки события (target: "event" — в #eventArea на вкладке событий и #panelEvent на панели)
function renderEventCard(ev, mode){
  const area = document.getElementById("eventArea") || document.getElementById("panelEvent");
  const panelArea = document.getElementById("panelEvent");
  const html = eventCardHTML(ev);
  // эффект "тасования"
  [area, state.activeTab==="panel"?panelArea:null].filter(Boolean).forEach((el,i,arr)=>{
    if(arr.indexOf(el)!==i) return;
  });
  const targetEl = document.getElementById("eventArea") || document.getElementById("panelEvent");
  if(targetEl){
    targetEl.innerHTML = '<div class="shuffling">🔀 Тасуем колоду событий…</div>';
    setTimeout(()=>{ targetEl.innerHTML = html; bindEventCard(ev, targetEl); }, 450);
  }
}
function eventCardHTML(ev){
  const tm = TYPE_META[ev.type], rm = RARITY_META[ev.rarity];
  const suit = suitablePlayers(ev);
  const badges = [
    '<span class="badge '+tm.badge+'">'+tm.label+'</span>',
    '<span class="badge '+rm.badge+'">'+rm.label+'</span>',
    '<span class="badge b-gray">'+esc(ev.category)+'</span>',
    '<span class="badge b-gray">Влияние: '+ev.impactLevel+'</span>'
  ];
  if(ev.autoApplicable) badges.push('<span class="badge b-teal">Денежный эффект</span>');
  if(ev.type==="crisis") badges.push('<span class="badge b-purple">Кризис</span>');
  if(ev.targetRule==="all") badges.push('<span class="badge b-blue">Для всех</span>');

  let suitHTML="";
  if(suit.length) suitHTML = '<div class="small ok-box" style="margin-top:8px">Подходит для: <b>'+suit.map(p=>esc(p.name)).join(", ")+'</b></div>';
  else if(ev.targetRule && ev.targetRule.indexOf("tag:")===0) suitHTML='<div class="small muted" style="margin-top:8px">Нет игроков с тегом «'+esc(ev.targetRule.slice(4))+'»</div>';

  let choicesHTML="";
  if(ev.choices){
    choicesHTML = '<div style="margin-top:10px"><div class="section-title">Варианты решения</div>'+
      ev.choices.map((c,i)=>{
        let outc="";
        if(c.outcomes) outc='<div class="small muted">'+c.outcomes.map(o=>esc(o.label)+' — '+o.chance+'%').join(" • ")+'</div>';
        return '<div class="choice"><div class="row spread"><b>'+esc(c.text)+'</b>'+
          '<button class="btn sm primary" data-choice="'+i+'">Выбрать</button></div>'+
          (c.risk?'<div class="small muted">Риск: '+esc(c.risk)+'</div>':'')+ outc +'</div>';
      }).join("")+'</div>';
  }

  // кнопки применения
  let applyBtns="";
  if(ev.moneyEffectType!=="none" && ev.moneyEffectType!=="custom" && !ev.choices){
    applyBtns = '<div class="row" style="margin-top:10px">'+
      '<button class="btn sm green" data-apply="player">К игроку</button>'+
      '<button class="btn sm" data-apply="team">К команде</button>'+
      '<button class="btn sm" data-apply="all">Ко всем</button>'+
      (ev.targetRule.indexOf("tag:")===0?'<button class="btn sm blue" data-apply="suit">К подходящим</button>':'')+
      '<button class="btn sm ghost" data-apply="skip">Пропустить</button>'+
    '</div>';
  }

  return '<div class="event-card appear">'+
    '<div class="edge" style="background:'+tm.edge+'"></div>'+
    '<div class="row" style="gap:5px">'+badges.join(" ")+'</div>'+
    '<div class="etitle">'+esc(ev.title)+'</div>'+
    '<p>'+esc(ev.description)+'</p>'+
    '<div class="small" style="margin-top:6px"><b>Кого касается:</b> '+esc(ev.appliesTo)+'</div>'+
    (ev.effect?'<div class="small" style="margin-top:6px"><b>Эффект:</b> '+esc(ev.effect)+'</div>':'')+
    '<div class="small muted" style="margin-top:4px">Длительность: '+esc(ev.duration)+'</div>'+
    (ev.discussionQuestion?'<div class="small" style="margin-top:6px">💬 <i>'+esc(ev.discussionQuestion)+'</i></div>':'')+
    suitHTML + choicesHTML + applyBtns +
    '<div class="row" style="margin-top:10px">'+
      '<button class="btn sm" data-evcopy="1">📋 Скопировать</button>'+
      '<button class="btn sm primary" data-act="event">🔄 Новое событие</button>'+
    '</div>'+
  '</div>';
}

  // Общая история партии
  html += '<div class="card"><div class="row spread"><h2>История партии</h2>'+
    '<span class="small muted">записей: '+state.gameHistory.length+'</span></div>'+
    '<div class="row" style="margin-bottom:10px">'+
      '<button class="btn sm" data-act="copyGame">📋 Скопировать</button>'+
      '<button class="btn sm" data-act="exportGame">📤 Экспорт</button>'+
      '<button class="btn sm red" data-act="clearGame">🗑️ Очистить</button>'+
    '</div>';
  if(!state.gameHistory.length) html+='<p class="muted">История пуста.</p>';
  else html += state.gameHistory.slice(0,200).map(h=>
    '<div class="hitem"><div class="ht">'+gameIcon(h.type)+' '+esc(h.title)+'</div>'+
    (h.desc?'<div class="small">'+esc(h.desc)+'</div>':'')+
    '<div class="hm">#'+h.n+' • раунд '+h.round+' • '+h.time+'</div></div>').join("");
  html += '</div>';
  return html;
}
function moneyRow(m){
  const up = m.amount>=0;
  const col = up?'var(--green)':'var(--red)';
  const typeLbl = {income:"Начисление",expense:"Списание",transfer:"Перевод",setBalance:"Баланс",percentChange:"% изменение",eventEffect:"Событие"}[m.type]||m.type;
  return '<div class="hitem" style="border-left-color:'+col+'">'+
    '<div class="row spread"><div class="ht">'+esc(m.targetName)+' <span class="small muted">('+typeLbl+')</span></div>'+
    '<b style="color:'+col+'">'+(up?'+':'')+fmt(m.amount)+'</b></div>'+
    '<div class="small">'+esc(m.reason)+(m.fromPlayer?' • '+esc(m.fromPlayer)+' → '+esc(m.toPlayer):'')+'</div>'+
    '<div class="hm">'+fmt(m.balanceBefore)+' → '+fmt(m.balanceAfter)+' • раунд '+m.round+' • '+m.timestamp+'</div></div>';
}
function gameIcon(t){ return {event:"🎴",dice:"🎲",challenge:"🎯",opportunity:"💎",round:"➡️",player:"🙋",team:"🤝",money:"💵",decision:"🧠",achievement:"🏆"}[t]||"•"; }

function historyToText(){
  let t="CashFlow Events — история партии\nРаунд: "+state.round+"\n\n=== СОБЫТИЯ ПАРТИИ ===\n";
  state.gameHistory.slice().reverse().forEach(h=>{ t+="#"+h.n+" [р."+h.round+", "+h.time+"] "+h.title+(h.desc?" — "+h.desc:"")+"\n"; });
  t+="\n=== ДЕНЕЖНЫЕ ОПЕРАЦИИ ===\n";
  state.moneyHistory.slice().reverse().forEach(m=>{ t+="["+m.timestamp+", р."+m.round+"] "+m.targetName+": "+(m.amount>=0?"+":"")+fmt(m.amount)+" ("+m.reason+") "+fmt(m.balanceBefore)+"→"+fmt(m.balanceAfter)+"\n"; });
  return t;
}

/* ----- 9) Достижения ----- */
function viewAch(){
  return '<div class="card"><h2>Достижения ('+state.achievements.length+'/'+ACHIEVEMENTS.length+')</h2>'+
    '<div class="grid g2" style="margin-top:10px">'+ACHIEVEMENTS.map(a=>{
      const open=state.achievements.includes(a.id);
      return '<div class="ach-card'+(open?' open':'')+'"><div class="row"><div class="ai">'+a.icon+'</div>'+
        '<div><b>'+esc(a.title)+'</b><div class="small muted">'+esc(a.desc)+'</div></div></div>'+
        (open?'<div class="badge b-gold" style="margin-top:6px">Открыто</div>':'<div class="badge b-gray" style="margin-top:6px">Закрыто</div>')+'</div>';
    }).join("")+'</div></div>';
}

/* ----- 10) Правила ----- */
function viewRules(){
  const r = [
    ["Когда тянуть событие","Тяните событие в начале круга или после ключевого хода — чтобы добавить динамику, но не прерывать сделки игроков."],
    ["Как применять событие","Прочитайте карточку вслух, выберите цель (игрок / команда / все / по тегам) и нажмите кнопку применения. Денежные эффекты можно применить автоматически."],
    ["Калькулятор игроков","Добавляйте игроков с именем и стартовым балансом. Быстрые кнопки меняют баланс, кастомная операция — с комментарием. Всё пишется в историю."],
    ["Начисление и списание","Используйте «+/−» или массовую операцию. Отрицательный баланс подсвечивается красным — это сигнал ведущему, а не запрет."],
    ["Команды","Создавайте команды, распределяйте игроков, применяйте к ним события и операции. Удаление команды не удаляет игроков."],
    ["Состояние экономики","Индекс риска и показатели меняются от событий и кубика. Высокий риск (>70) повышает шанс кризисов, низкий (<30) — возможностей."],
    ["Интерактивные решения","Для событий-решений игрок выбирает вариант. Часть вариантов — мини-игра «риск/безопасность» со случайным исходом по процентам."],
    ["Как не сломать баланс","Адаптируйте суммы под уровень игроков. Базовые суммы рассчитаны на средний этап CashFlow — на старте уменьшайте, в конце увеличивайте."],
    ["Если событие не подходит","Нажмите «Пропустить» или «Новое событие». Ведущий вправе заменить или смягчить эффект."],
    ["Гибкость ведущего","Все суммы и проценты — ориентир. Ведущий может округлять, делить на команды и подстраивать под ситуацию за столом."]
  ];
  return '<div class="card"><h2>Правила применения</h2>'+
    r.map((x,i)=>'<div style="margin-bottom:10px"><b>'+(i+1)+'. '+esc(x[0])+'</b><div class="small muted">'+esc(x[1])+'</div></div>').join("")+
    '<hr class="sep"><p class="small muted">Неофициальный фанатский модуль. Все события оригинальны и не воспроизводят защищённые материалы игры CashFlow.</p>'+
  '</div>';

/* ---------- Привязка событий интерфейса ---------- */
// Делегирование кликов по вкладкам
document.getElementById("tabs").addEventListener("click", e=>{
  const b=e.target.closest("[data-tab]"); if(b) setTab(b.dataset.tab);
});

function bindView(){
  const view = document.getElementById("view");

  // Делегированный обработчик кликов
  view.onclick = function(e){
    const a = e.target.closest("[data-act]");
    if(a){ handleAct(a.dataset.act, a); return; }
    const m = e.target.closest("[data-money]");
    if(m){ const p=byId(state.players,m.dataset.money); const amt=parseInt(m.dataset.amt,10);
      changeMoney(p.id, Math.abs(amt), (amt>0?"Быстрое начисление":"Быстрое списание"), amt>0); return; }
  };

  // Селекты на панели
  const modeSel=document.getElementById("modeSel");
  if(modeSel) modeSel.onchange=()=>{ state.mode=modeSel.value; save(); render(); };
  const trendSel=document.getElementById("trendSel");
  if(trendSel) trendSel.onchange=()=>{ state.trendId=trendSel.value; save(); render(); };
  const catF=document.getElementById("catFilter");
  if(catF) catF.onchange=()=>{ categoryFilter=catF.value; };
  const histF=document.getElementById("histFilter");
  if(histF) histF.onchange=()=>{ histFilter=histF.value; render(); };

  // Массовые операции: показать нужные поля
  const ms=document.getElementById("massScope");
  if(ms){
    const upd=()=>{
      document.getElementById("massTeamWrap").classList.toggle("hidden", ms.value!=="team");
      document.getElementById("massTagWrap").classList.toggle("hidden", ms.value!=="tag");
      document.getElementById("massPickWrap").classList.toggle("hidden", ms.value!=="selected");
    };
    ms.onchange=upd; upd();
  }
}

// Центральный обработчик действий
function handleAct(act, el){
  const id = el.dataset.id;
  switch(act){
    case "event": drawEvent(); break;
    case "dice": rollDice(); break;
    case "crisis": crisisRound(); break;
    case "challenge": drawChallenge(); break;
    case "opp": drawOpportunity(); break;
    case "next": nextRound(); break;
    case "backup": backupJSON(); break;
    case "restore": restoreJSON(); break;
    case "reset": resetGame(); break;

    case "addPlayer": {
      const name=val("newName"), cash=parseFloat(val("newCash"))||0, team=val("newTeam")||null;
      if(addPlayer(name, cash, team)){ /* очистка через ререндер */ }
      break; }
    case "transfer": transfer(val("trFrom"), val("trTo"), parseFloat(val("trAmount"))||0, val("trComment")); break;
    case "custom": {
      const amt=parseFloat(document.querySelector('[data-cust="'+id+'"]').value)||0;
      const op=document.querySelector('[data-custop="'+id+'"]').value;
      const r=document.querySelector('[data-custr="'+id+'"]').value;
      if(!amt){ toast("⚠️ Укажите сумму"); break; }
      changeMoney(id, amt, r||(op==="income"?"Начисление":"Списание"), op==="income");
      break; }
    case "editPlayer": editPlayerModal(id); break;
    case "tagsPlayer": tagsModal(id); break;
    case "delPlayer": {
      const p=byId(state.players,id);
      confirmModal("Удалить игрока?","Игрок «"+p.name+"» будет удалён. Действие записывается в историю.",()=>{deletePlayer(id);toast("🗑️ Игрок удалён");},"Удалить","red");
      break; }
    case "massApply": doMassApply(); break;

    case "addTeam": addTeam(val("teamName"), val("teamColor")); break;
    case "teamAdd": teamMoneyModal(id, true); break;
    case "teamSub": teamMoneyModal(id, false); break;
    case "teamAssign": teamAssignModal(id); break;
    case "teamEdit": teamEditModal(id); break;
    case "teamDel": {
      const t=byId(state.teams,id);
      confirmModal("Удалить команду?","Команда «"+t.name+"» будет удалена. Игроки станут «без команды».",()=>{deleteTeam(id);toast("🗑️ Команда удалена");},"Удалить","red");
      break; }

    case "copyHist": copyText(state.moneyHistory.map(m=>m.targetName+": "+(m.amount>=0?"+":"")+fmt(m.amount)+" — "+m.reason).join("\n")); toast("📋 История операций скопирована"); break;
    case "exportHist": exportTextModal("Денежные операции", state.moneyHistory.slice().reverse().map(m=>"["+m.timestamp+"] "+m.targetName+": "+(m.amount>=0?"+":"")+fmt(m.amount)+" ("+m.reason+")").join("\n")); break;
    case "clearMoney": confirmModal("Очистить операции?","Денежная история будет удалена.",()=>{state.moneyHistory=[];save();render();toast("🗑️ Операции очищены");},"Очистить","red"); break;
    case "copyGame": copyText(historyToText()); toast("📋 История партии скопирована"); break;
    case "exportGame": exportTextModal("История партии", historyToText()); break;
    case "clearGame": confirmModal("Очистить историю партии?","Вся история партии будет удалена.",()=>{state.gameHistory=[];save();render();toast("🗑️ История очищена");},"Очистить","red"); break;
  }
}
function val(id){ const el=document.getElementById(id); return el?el.value:""; }

function exportTextModal(title, text){
  modal(title, '<textarea style="min-height:240px;font-family:monospace;font-size:11px">'+esc(text)+'</textarea>',
    [{label:"Закрыть",cls:"ghost"},{label:"Скопировать",cls:"primary",onClick:(c)=>{copyText(text);toast("📋 Скопировано");}}]);
}

// Привязка кнопок внутри карточки события
function bindEventCard(ev, el){
  el.querySelectorAll("[data-apply]").forEach(b=>{
    b.onclick=()=>{
      const mode=b.dataset.apply;
      if(mode==="skip"){ toast("⏭️ Эффект пропущен"); logGame("event","Пропущен эффект: "+ev.title); save(); return; }
      if(mode==="all"){ applyEventTo(ev, state.players.slice()); return; }
      if(mode==="suit"){ applyEventTo(ev, suitablePlayers(ev)); return; }
      if(mode==="player"){ pickPlayerThen(p=>applyEventTo(ev,[p])); return; }
      if(mode==="team"){ pickTeamThen(tid=>applyEventTo(ev, teamMembers(tid))); return; }
    };
  });
  el.querySelectorAll("[data-choice]").forEach(b=>{
    b.onclick=()=>{
      const c=ev.choices[parseInt(b.dataset.choice,10)];
      const rule=c.targetRule||"player";
      if(rule==="player"){ pickPlayerThen(p=>applyChoice(ev,c,{playerId:p.id})); }
      else if(rule==="team"){ pickTeamThen(tid=>applyChoice(ev,c,{teamId:tid})); }
      else applyChoice(ev,c,{});
    };
  });
  const cp=el.querySelector("[data-evcopy]");
  if(cp) cp.onclick=()=>{ copyText(ev.title+"\n"+ev.category+" • "+TYPE_META[ev.type].label+"\n"+ev.description+"\nЭффект: "+ev.effect); toast("📋 Событие скопировано"); };
  const newBtn=el.querySelector('[data-act="event"]');
  if(newBtn) newBtn.onclick=()=>drawEvent();
}

/* ---------- Модальные редакторы ---------- */
function editPlayerModal(id){
  const p=byId(state.players,id); if(!p) return;
  const teamOpts='<option value="">Без команды</option>'+state.teams.map(t=>'<option value="'+t.id+'"'+(t.id===p.teamId?' selected':'')+'>'+esc(t.name)+'</option>').join("");
  modal("Редактировать: "+p.name,
    '<div class="field"><label class="fl">Имя</label><input id="ePName" value="'+esc(p.name)+'"></div>'+
    '<div class="field"><label class="fl">Баланс</label><input id="ePCash" type="number" value="'+p.cash+'"></div>'+
    '<div class="field"><label class="fl">Команда</label><select id="ePTeam">'+teamOpts+'</select></div>'+
    '<div class="field"><label class="fl">Заметка</label><textarea id="ePNotes">'+esc(p.notes)+'</textarea></div>',
    [{label:"Отмена",cls:"ghost"},{label:"Сохранить",cls:"green",onClick:(close,ov)=>{
      updatePlayer(id,{name:ov.querySelector("#ePName").value, cash:parseFloat(ov.querySelector("#ePCash").value),
        teamId:ov.querySelector("#ePTeam").value||null, notes:ov.querySelector("#ePNotes").value});
      close(); toast("✅ Сохранено");
    }}]);
}
function tagsModal(id){
  const p=byId(state.players,id); if(!p) return;
  const body='<div class="row" style="gap:6px">'+PLAYER_TAGS.map(t=>
    '<span class="tag-chip'+(p.tags.includes(t)?' on':'')+'" data-tagtoggle="'+esc(t)+'">'+esc(t)+'</span>').join("")+'</div>';
  const ov=modal("Теги: "+p.name, body, [{label:"Готово",cls:"primary"}]);
  ov.querySelectorAll("[data-tagtoggle]").forEach(ch=>{
    ch.onclick=()=>{ toggleTag(id, ch.dataset.tagtoggle); ch.classList.toggle("on"); };
  });
}
function teamMoneyModal(id, isAdd){
  const t=byId(state.teams,id); const mem=teamMembers(id);
  if(!mem.length){ toast("⚠️ В команде нет игроков"); return; }
  modal((isAdd?"Начислить команде: ":"Списать у команды: ")+t.name,
    '<div class="field"><label class="fl">Тип</label><select id="tmType"><option value="amount">Фиксированная сумма каждому</option><option value="percent">Процент наличных</option></select></div>'+
    '<div class="field"><label class="fl">Значение</label><input id="tmVal" type="number" placeholder="напр. 1000 или 10"></div>'+
    '<div class="field"><label class="fl">Причина</label><input id="tmReason" placeholder="Причина"></div>'+
    '<p class="small muted">Участников: '+mem.length+'</p>',
    [{label:"Отмена",cls:"ghost"},{label:isAdd?"Начислить":"Списать",cls:isAdd?"green":"red",onClick:(close,ov)=>{
      const type=ov.querySelector("#tmType").value, v=parseFloat(ov.querySelector("#tmVal").value)||0, r=ov.querySelector("#tmReason").value||"Командная операция";
      let eff;
      if(type==="amount") eff={moneyEffectType:isAdd?"add":"subtract",moneyAmount:v,opType:isAdd?"income":"expense"};
      else eff={moneyEffectType:isAdd?"percentAdd":"percentSubtract",moneyPercent:v,opType:"percentChange"};
      applyMoneyEffect(mem, eff, "Команда «"+t.name+"»: "+r);
      logGame("money",(isAdd?"Начисление команде: ":"Списание у команды: ")+t.name, r+" — "+mem.length+" игроков", mem.map(x=>x.id),[id]);
      save(); render(); close(); toast("✅ Готово");
    }}]);
}
function teamAssignModal(id){
  const t=byId(state.teams,id);
  const body=state.players.map(p=>'<label class="pick"><input type="checkbox" value="'+p.id+'"'+(p.teamId===id?' checked':'')+' style="width:auto"> '+esc(p.name)+' <span class="muted small">('+(p.teamId?teamName(p.teamId):'без команды')+')</span></label>').join("")||'<p class="muted">Нет игроков.</p>';
  modal("Состав команды: "+t.name, '<div class="pickbox">'+body+'</div>',
    [{label:"Отмена",cls:"ghost"},{label:"Сохранить",cls:"primary",onClick:(close,ov)=>{
      const checked=[...ov.querySelectorAll('input:checked')].map(c=>c.value);
      state.players.forEach(p=>{
        if(checked.includes(p.id)) p.teamId=id;
        else if(p.teamId===id) p.teamId=null;
      });
      logGame("team","Изменён состав команды: "+t.name,"Участников: "+checked.length);
      save(); render(); close(); toast("✅ Состав обновлён");
    }}]);
}
function teamEditModal(id){
  const t=byId(state.teams,id);
  modal("Изменить команду",
    '<div class="field"><label class="fl">Название</label><input id="etName" value="'+esc(t.name)+'"></div>'+
    '<div class="field"><label class="fl">Цвет</label><input id="etColor" type="color" value="'+t.color+'" style="height:40px"></div>'+
    '<div class="field"><label class="fl">Заметка</label><textarea id="etNotes">'+esc(t.notes)+'</textarea></div>',
    [{label:"Отмена",cls:"ghost"},{label:"Сохранить",cls:"green",onClick:(close,ov)=>{
      updateTeam(id,{name:ov.querySelector("#etName").value,color:ov.querySelector("#etColor").value,notes:ov.querySelector("#etNotes").value});
      close(); toast("✅ Сохранено");
    }}]);
}

// Применение массовой операции
function doMassApply(){
  const scope=val("massScope"), kind=val("massKind"), v=parseFloat(val("massVal"))||0, reason=val("massReason")||"Массовая операция";
  let targets=[];
  if(scope==="all") targets=state.players.slice();
  else if(scope==="team") targets=teamMembers(val("massTeam"));
  else if(scope==="tag") targets=state.players.filter(p=>p.tags.includes(val("massTag")));
  else if(scope==="selected") targets=[...document.querySelectorAll('#massPick input:checked')].map(c=>byId(state.players,c.value)).filter(Boolean);
  if(!targets.length){ toast("⚠️ Нет подходящих игроков"); return; }
  const op={kind:kind, amount:v, percent:v, factor:v, reason:reason};
  const labelKind={add:"начислить "+fmt(v),subtract:"списать "+fmt(v),set:"установить баланс "+fmt(v),multiply:"умножить на "+v,percentAdd:"+"+v+"%",percentSubtract:"-"+v+"%"}[kind];
  confirmModal("Массовая операция","Применить «"+labelKind+"» к "+targets.length+" игрокам?",()=>{
    massOperation(targets, op); toast("✅ Применено к "+targets.length+" игрокам");
  },"Применить","primary");
}

/* ---------- 9) INIT ---------- */
render();
